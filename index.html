<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Banco dos Marimbondos - Sistema de GestĂŁo (VersĂŁo 1.0)</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23FFB800'/><circle cx='35' cy='35' r='8' fill='%2310B981'/><circle cx='65' cy='35' r='8' fill='%2310B981'/><circle cx='50' cy='65' r='12' fill='%23DC2626'/></svg>">
    
    <!-- Frameworks e Fontes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Configurar Tailwind para produĂ§ĂŁo
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        'outfit': ['Outfit', 'sans-serif'],
                        'jakarta': ['Plus Jakarta Sans', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="vendor/xlsx.min.js"></script>
    <script src="vendor/mammoth.browser.min.js"></script>
    <script src="vendor/pdf.min.js"></script>
    <!-- Firebase (Compat para manter firebase.database() estilo legado) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

    <style>
        :root {
            /* Cores Tema Marimbondos */
            --primary: #FFB800;          /* Ouro das abelhas */
            --primary-dark: #F59E0B;     /* Ămbar escuro */
            --secondary: #10B981;        /* Verde da natureza */
            --tertiary: #1F2937;         /* Preto profundo */
            --accent: #FBBF24;           /* Destaque ouro */
            --success: #059669;
            --danger: #DC2626;
            --warning: #F59E0B;
            
            /* Tema Claro - Cinzas Melhorados */
            --bg: #FAF1CC;
            --bg-secondary: #EED79A;
            --bg-card: #FFF7DE;
            --text-primary: #2F2410;
            --text-secondary: #5B4410;
            --text-tertiary: #7C5A10;
            --border: rgba(180, 83, 9, 0.26);
            --shadow: rgba(146, 64, 14, 0.14);
            --surface-1: #FFF2C4;
            --surface-2: #E9CD81;
            --surface-muted: #E0BE62;
            --panel-border: rgba(146, 64, 14, 0.18);
            --panel-shadow: 0 12px 28px rgba(146, 64, 14, 0.12);
        }
        
        html.dark {
            /* Tema Escuro - Marimbondos */
            --bg: #0F0E0C;               /* Preto morno */
            --bg-secondary: #1A1612;
            --bg-card: #2A251F;
            --text-primary: #FEF3C7;     /* Bege claro */
            --text-secondary: #FDE68A;   /* Amarelo claro (era #F3E8FF) */
            --text-tertiary: #FCD34D;    /* Amarelo mais forte (era #BFDBFE) */
            --border: #FBBF24;
            --shadow: rgba(251, 184, 0, 0.2);
            --surface-1: #1F2937;
            --surface-2: #111827;
            --surface-muted: #273449;
            --panel-border: rgba(251, 191, 36, 0.16);
            --panel-shadow: 0 14px 32px rgba(0, 0, 0, 0.30);
        }
        
        * { 
            transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
        }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            background-image: 
                repeating-linear-gradient(45deg, transparent, transparent 100px, rgba(255, 184, 0, 0.02) 100px, rgba(255, 184, 0, 0.02) 200px),
                radial-gradient(circle at 20% 50%, rgba(16, 185, 129, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 184, 0, 0.05) 0%, transparent 50%);
            color: var(--text-primary);
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none;
        }
        
        html, body {
            touch-action: manipulation;
        }

        .modal-scroll-shell {
            width: 100%;
            max-height: min(100vh - 1.5rem, 960px);
            overflow-y: scroll;
            overflow-x: hidden;
            overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch;
            padding: 0.25rem 0.4rem 0.25rem 0.25rem;
            scrollbar-gutter: stable both-edges;
        }

        .modal-scroll-region {
            overflow-y: auto;
            overflow-x: hidden;
            overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch;
            padding-right: 0.35rem;
            scrollbar-gutter: stable;
        }

        .modal-scroll-shell::-webkit-scrollbar,
        .modal-scroll-region::-webkit-scrollbar {
            width: 10px;
        }

        .modal-scroll-shell::-webkit-scrollbar-track,
        .modal-scroll-region::-webkit-scrollbar-track {
            background: rgba(148, 163, 184, 0.12);
            border-radius: 999px;
        }

        .modal-scroll-shell::-webkit-scrollbar-thumb,
        .modal-scroll-region::-webkit-scrollbar-thumb {
            background: rgba(245, 158, 11, 0.42);
            border-radius: 999px;
            border: 2px solid transparent;
            background-clip: padding-box;
        }

        .student-import-card {
            scroll-margin-top: 1rem;
        }

        .student-import-shell {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .student-import-hero {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            padding: 1.1rem;
            border-radius: 1.5rem;
            border: 1px solid rgba(148, 163, 184, 0.18);
            background: linear-gradient(180deg, rgba(255, 251, 235, 0.96), rgba(255, 255, 255, 0.94));
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
        }

        .student-import-hero-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
        }

        .student-import-toolbar,
        .student-import-stage-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .student-import-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.45rem 0.75rem;
            border-radius: 999px;
            background: rgba(15, 23, 42, 0.06);
            color: #334155;
            font-size: 0.65rem;
            font-weight: 800;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .student-import-overview {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .student-import-summary {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 0.75rem;
        }

        .student-import-stepper {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.75rem;
        }

        .student-import-step {
            display: flex;
            gap: 0.85rem;
            align-items: flex-start;
            padding: 1rem;
            border-radius: 1.25rem;
            border: 1px solid rgba(148, 163, 184, 0.18);
            background: rgba(248, 250, 252, 0.72);
        }

        .student-import-step-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 2rem;
            height: 2rem;
            border-radius: 999px;
            background: rgba(148, 163, 184, 0.16);
            color: #475569;
            font-size: 0.75rem;
            font-weight: 900;
            flex-shrink: 0;
        }

        .student-import-step-active {
            border-color: rgba(245, 158, 11, 0.26);
            background: rgba(255, 251, 235, 0.95);
            box-shadow: 0 16px 28px rgba(245, 158, 11, 0.12);
        }

        .student-import-step-active .student-import-step-badge {
            background: linear-gradient(180deg, #fbbf24, #f59e0b);
            color: #1f2937;
        }

        .student-import-stage {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .student-import-stage-header {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            align-items: flex-start;
            padding: 1rem;
            border-radius: 1.35rem;
            border: 1px solid rgba(148, 163, 184, 0.18);
            background: rgba(248, 250, 252, 0.84);
        }

        .student-import-stage-list {
            overflow: visible;
            padding-right: 0;
            max-height: none;
        }

        .student-import-stage-list::-webkit-scrollbar {
            width: 10px;
        }

        .student-import-stage-list::-webkit-scrollbar-track {
            background: rgba(148, 163, 184, 0.12);
            border-radius: 999px;
        }

        .student-import-stage-list::-webkit-scrollbar-thumb {
            background: rgba(245, 158, 11, 0.42);
            border-radius: 999px;
            border: 2px solid transparent;
            background-clip: padding-box;
        }

        .student-import-metric {
            border-radius: 1.35rem;
            padding: 1rem;
            text-align: left;
            border: 1px solid transparent;
        }

        .student-import-card-surface {
            border-radius: 1.15rem;
            border: 1px solid rgba(148, 163, 184, 0.16);
            background: rgba(255, 255, 255, 0.92);
        }

        .student-import-note {
            border-radius: 0.95rem;
            padding: 0.75rem 0.85rem;
            background: rgba(248, 250, 252, 0.95);
            border: 1px dashed rgba(148, 163, 184, 0.22);
            color: #475569;
            font-size: 0.8rem;
            line-height: 1.45;
            word-break: break-word;
        }

        .student-import-panels {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 1rem;
        }

        .student-import-panel {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
            padding: 1rem;
            border-radius: 1.6rem;
            border: 1px solid rgba(148, 163, 184, 0.18);
            background: rgba(248, 250, 252, 0.8);
        }

        .student-import-panel-list {
            overflow-y: auto;
            overflow-x: hidden;
            overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch;
            scrollbar-gutter: stable;
            padding-right: 0.35rem;
            max-height: min(42vh, 420px);
        }

        .student-import-panel-list::-webkit-scrollbar {
            width: 10px;
        }

        .student-import-panel-list::-webkit-scrollbar-track {
            background: rgba(148, 163, 184, 0.12);
            border-radius: 999px;
        }

        .student-import-panel-list::-webkit-scrollbar-thumb {
            background: rgba(245, 158, 11, 0.42);
            border-radius: 999px;
            border: 2px solid transparent;
            background-clip: padding-box;
        }

        .student-import-footer {
            position: sticky;
            bottom: 0;
            z-index: 2;
            padding-top: 0.75rem;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0), var(--bg-card) 38%);
            border-top: 1px solid rgba(148, 163, 184, 0.14);
            margin-top: 0.5rem;
        }

        html.dark .student-import-panel {
            background: rgba(17, 24, 39, 0.76);
            border-color: rgba(251, 191, 36, 0.16);
        }

        html.dark .student-import-hero,
        html.dark .student-import-card-surface {
            background: rgba(17, 24, 39, 0.9);
            border-color: rgba(251, 191, 36, 0.16);
            box-shadow: 0 20px 44px rgba(0, 0, 0, 0.24);
        }

        html.dark .student-import-step,
        html.dark .student-import-stage-header {
            background: rgba(17, 24, 39, 0.76);
            border-color: rgba(251, 191, 36, 0.16);
        }

        html.dark .student-import-step-badge {
            background: rgba(251, 191, 36, 0.16);
            color: #fde68a;
        }

        html.dark .student-import-step-active {
            background: rgba(120, 53, 15, 0.28);
            border-color: rgba(251, 191, 36, 0.28);
            box-shadow: 0 16px 28px rgba(0, 0, 0, 0.22);
        }

        html.dark .student-import-footer {
            background: linear-gradient(180deg, rgba(15, 23, 42, 0), rgba(31, 41, 55, 0.96) 38%);
        }

        html.dark .student-import-pill {
            background: rgba(251, 191, 36, 0.12);
            color: #fde68a;
        }

        html.dark .student-import-note {
            background: rgba(15, 23, 42, 0.78);
            border-color: rgba(251, 191, 36, 0.16);
            color: #cbd5e1;
        }

        .dark-light .student-import-panel {
            background: rgba(255, 252, 242, 0.88);
            border-color: rgba(217, 119, 6, 0.14);
        }

        .dark-light .student-import-hero,
        .dark-light .student-import-card-surface {
            background: rgba(255, 252, 242, 0.94);
            border-color: rgba(217, 119, 6, 0.14);
        }

        .dark-light .student-import-step,
        .dark-light .student-import-stage-header {
            background: rgba(255, 252, 242, 0.9);
            border-color: rgba(217, 119, 6, 0.14);
        }

        #toast-container {
            pointer-events: none;
        }

        #toast-container > div {
            pointer-events: auto;
        }

        .student-import-card input,
        .student-import-card select {
            min-height: 44px;
        }
        
        input, textarea, select {
            -webkit-user-select: text;
            user-select: text;
            background-color: var(--bg-card);
            color: var(--text-primary);
            border-color: var(--border);
        }
        
        .font-outfit { font-family: 'Outfit', sans-serif; }
        
        .glass { 
            background: rgba(255, 184, 0, 0.08);
            backdrop-filter: blur(20px);
            border: 2px solid var(--border);
        }
        
        html.dark .glass { 
            background: rgba(255, 184, 0, 0.05);
            border: 2px solid var(--border);
        }
        
        .card-shadow { 
            box-shadow: 0 14px 24px -8px var(--shadow), 0 8px 16px -10px rgba(15, 23, 42, 0.18);
        }
        
        .btn-bounce { transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .btn-bounce:hover:not(:disabled) { 
            transform: translateY(-3px);
            box-shadow: 0 18px 24px -8px rgba(255, 184, 0, 0.24);
        }
        .btn-bounce:active { transform: scale(0.96); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* ===== ANIMAĂĂES MARIMBONDOS ===== */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes softRise {
            from { opacity: 0; transform: translateY(18px) scale(0.985); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes touchPulse {
            0% { transform: scale(1); }
            50% { transform: scale(0.975); }
            100% { transform: scale(1); }
        }

        @keyframes toastSlideIn {
            from { opacity: 0; transform: translateY(-12px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes shimmerSweep {
            from { transform: translateX(-135%); opacity: 0; }
            35% { opacity: 0.18; }
            to { transform: translateX(135%); opacity: 0; }
        }
        
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 5px rgba(255, 184, 0, 0.3), inset 0 0 10px rgba(255, 184, 0, 0.1); }
            50% { box-shadow: 0 0 20px rgba(255, 184, 0, 0.6), inset 0 0 15px rgba(255, 184, 0, 0.2); }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes honeycomb {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.05); }
            100% { transform: rotate(360deg) scale(1); }
        }
        
        .animate-in { animation: fadeIn 0.6s ease-out forwards; }
        .animate-slide { animation: slideInLeft 0.6s ease-out forwards; }
        .animate-scale { animation: scaleIn 0.5s ease-out forwards; }
        .animate-pulse { animation: pulse 2s ease-in-out infinite; }
        .animate-glow { animation: glow 3s ease-in-out infinite; }
        .bee-float { animation: float 4s ease-in-out infinite; }
        .animate-slideUp { animation: slideUp 0.7s ease-out forwards; }
        .animate-honeycomb { animation: honeycomb 20s linear infinite; }
        .animate-soft-rise { animation: softRise 0.55s cubic-bezier(0.22, 1, 0.36, 1) both; }

        .interactive-surface,
        .ranking-card,
        .history-item,
        .transaction-student-card,
        .student-class-card,
        #nav-container button,
        #toast-container > div,
        #global-modal-content {
            position: relative;
            overflow: hidden;
        }

        .interactive-surface::after,
        .ranking-card::after,
        .history-item::after,
        .transaction-student-card::after,
        .student-class-card::after,
        #nav-container button::after,
        #global-modal-content::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(110deg, transparent 0%, rgba(255, 255, 255, 0.18) 48%, transparent 100%);
            transform: translateX(-135%);
            pointer-events: none;
        }

        .interactive-surface:hover::after,
        .ranking-card:hover::after,
        .history-item:hover::after,
        .transaction-student-card:hover::after,
        .student-class-card:hover::after,
        #nav-container button:hover::after {
            animation: shimmerSweep 0.95s ease-out;
        }

        .tab-stagger > * {
            opacity: 0;
            animation: softRise 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .tab-stagger > *:nth-child(1) { animation-delay: 0.02s; }
        .tab-stagger > *:nth-child(2) { animation-delay: 0.06s; }
        .tab-stagger > *:nth-child(3) { animation-delay: 0.10s; }
        .tab-stagger > *:nth-child(4) { animation-delay: 0.14s; }
        .tab-stagger > *:nth-child(5) { animation-delay: 0.18s; }
        .tab-stagger > *:nth-child(6) { animation-delay: 0.22s; }

        .pressable {
            will-change: transform, box-shadow, filter;
            transform-origin: center;
        }

        .pressable:active {
            animation: touchPulse 0.18s ease-out;
        }

        /* TransiĂ§Ăľes em Elementos */
        button, input, select, textarea { 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        button:hover:not(:disabled) { 
            background-color: var(--primary-dark) !important;
            transform: translateY(-2px);
        }
        
        button:focus:not(:disabled) { 
            outline: 3px solid var(--primary);
            outline-offset: 2px;
        }
        
        input:focus, textarea:focus, select:focus {
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 4px rgba(255, 184, 0, 0.15) !important;
        }

        @media (hover: none) and (pointer: coarse) {
            .btn-bounce:hover:not(:disabled),
            button:hover:not(:disabled),
            #nav-container button:hover,
            .ranking-card:hover,
            .history-item:hover,
            .student-class-card:hover,
            .transaction-student-card:hover {
                transform: none !important;
                box-shadow: inherit !important;
            }

            .pressable:active,
            button:active,
            #nav-container button:active,
            .ranking-card:active,
            .history-item:active,
            .student-class-card:active,
            .transaction-student-card:active,
            .student-class-trigger:active {
                transform: scale(0.975) !important;
                filter: brightness(1.03) saturate(1.03);
            }
        }

        /* Modal Animado */
        #global-modal {
            animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            transition: all 0.4s ease-out;
            overflow: hidden;
            overscroll-behavior: contain;
        }

        #global-modal.modal-closing {
            animation: fadeOut 0.34s cubic-bezier(0.4, 0, 0.2, 1) forwards !important;
        }
        
        #global-modal-content {
            animation: scaleIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            transition: all 0.3s ease-in;
            transform-origin: center center;
            background: linear-gradient(135deg, var(--bg-card) 0%, rgba(254, 243, 199, 0.3) 100%);
            border: 2px solid var(--border);
        }

        #global-modal-content.modal-closing {
            animation: scaleOut 0.34s cubic-bezier(0.22, 1, 0.36, 1) forwards !important;
        }

        @keyframes fadeOut {
            from { opacity: 1; backdrop-filter: blur(0px); }
            to { opacity: 0; backdrop-filter: blur(1px); }
        }
        
        @keyframes scaleOut {
            0% {
                transform: translateY(0) scale(1) rotateX(0deg);
                opacity: 1;
                filter: blur(0px);
            }
            35% {
                transform: translateY(6px) scale(0.985) rotateX(3deg);
                opacity: 0.98;
                filter: blur(0px);
            }
            100% {
                transform: translateY(54px) scale(0.9) rotateX(12deg);
                opacity: 0;
                filter: blur(5px);
            }
        }

        /* Checkbox Customizada - MELHORIA VISUAL */
        .trans-student-cb:checked + div {
            border-color: var(--primary) !important;
            background: linear-gradient(135deg, rgba(255, 184, 0, 0.25), rgba(16, 185, 129, 0.15)) !important;
            box-shadow: 0 0 15px rgba(255, 184, 0, 0.25) !important;
        }
        
        .trans-student-cb + div .w-5.h-5 {
            background: #fff;
            border: 2px solid var(--border);
            transition: background 0.2s, border 0.2s;
        }
        
        .trans-student-cb:checked + div .w-5.h-5 {
            background: var(--primary);
            border-color: var(--primary-dark);
        }
        
        .trans-student-cb:checked + div .w-3.h-3 {
            color: #fff !important;
            opacity: 1 !important;
        }

        /* Ranking e Zona de Perigo - Tema Escuro */

        @keyframes fadeIn {

        }

            from { opacity: 0; transform: translateX(-30px); }

            from { opacity: 0; transform: translateX(30px); }

    <script>
        // --- SISTEMA DE PERSISTĂNCIA COM LOCALSTORAGE ---
        class DataPersistence {
            constructor() {
                this.storageKey = 'marimbondos_db';
                this.dbName = 'MarimbondosDB';
                this.storeName = 'appData';
                this.db = null;
                this.initIndexedDB();
            }

            initIndexedDB() {
                if (!('indexedDB' in window)) {
                    console.warn('IndexedDB nĂŁo disponĂ­vel, usando localStorage');
                    return;
                }
                
                const request = indexedDB.open(this.dbName, 1);
                
                request.onerror = () => {
                    console.error('Erro ao abrir IndexedDB');
                };
                
                request.onsuccess = (e) => {
                    this.db = e.target.result;
                    console.log('â IndexedDB inicializado');
                };
                
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(this.storeName)) {
                        db.createObjectStore(this.storeName);
                    }
                };
            }

            save(data) {
                // Tentar salvar em IndexedDB primeiro
                if (this.db) {
                    try {
                        const transaction = this.db.transaction([this.storeName], 'readwrite');
                        const store = transaction.objectStore(this.storeName);
                        store.put(data, this.storageKey);
                        console.log('â Dados salvos em IndexedDB');
                    } catch(err) {
                        console.warn('Erro ao salvar em IndexedDB:', err);
                        // Fallback para localStorage
                        this.saveToLocalStorage(data);
                    }
                } else {
                    // Usar localStorage como fallback
                    this.saveToLocalStorage(data);
                }
            }

            saveToLocalStorage(data) {
                try {
                    localStorage.setItem(this.storageKey, JSON.stringify(data));
                    console.log('â Dados salvos em localStorage');
                } catch(err) {
                    console.error('Erro ao salvar em localStorage:', err);
                }
            }

            load() {
                // Tentar carregar de IndexedDB primeiro
                if (this.db) {
                    return new Promise((resolve) => {
                        try {
                            const transaction = this.db.transaction([this.storeName], 'readonly');
                            const store = transaction.objectStore(this.storeName);
                            const request = store.get(this.storageKey);
                            
                            request.onsuccess = () => {
                                if (request.result) {
                                    console.log('â Dados carregados de IndexedDB');
                                    resolve(request.result);
                                } else {
                                    // Fallback para localStorage
                                    resolve(this.loadFromLocalStorage());
                                }
                            };
                            
                            request.onerror = () => {
                                console.warn('Erro ao carregar de IndexedDB');
                                resolve(this.loadFromLocalStorage());
                            };
                        } catch(err) {
                            console.warn('Erro ao acessar IndexedDB:', err);
                            resolve(this.loadFromLocalStorage());
                        }
                    });
                } else {
                    // Usar localStorage diretamente
                    return Promise.resolve(this.loadFromLocalStorage());
                }
            }

            loadFromLocalStorage() {
                try {
                    const data = localStorage.getItem(this.storageKey);
                    if (data) {
                        console.log('â Dados carregados de localStorage');
                        return JSON.parse(data);
                    }
                    return null;
                } catch(err) {
                    console.error('Erro ao carregar de localStorage:', err);
                    return null;
                }
            }

            clear() {
                // Limpar IndexedDB
                if (this.db) {
                    try {
                        const transaction = this.db.transaction([this.storeName], 'readwrite');
                        const store = transaction.objectStore(this.storeName);
                        store.delete(this.storageKey);
                    } catch(err) {
                        console.warn('Erro ao limpar IndexedDB:', err);
                    }
                }
                
                // Limpar localStorage
                try {
                    localStorage.removeItem(this.storageKey);
                } catch(err) {
                    console.error('Erro ao limpar localStorage:', err);
                }
            }
        }

        function normalizeFirebasePathSegment(segment) {
            if (!segment || typeof segment !== 'string') return 'local';
            return segment
                .trim()
                .replace(/\./g, '_')
                .replace(/\#/g, '_')
                .replace(/\$/g, '_')
                .replace(/\[/g, '_')
                .replace(/\]/g, '_')
                .replace(/\//g, '_')
                .replace(/@/g, '_at_')
                .replace(/\s+/g, '_')
                .replace(/[^a-zA-Z0-9_\-]/g, '_') || 'local';
        }

        // Aguardar Firebase estar disponĂ­vel
        function waitForFirebase(callback, maxAttempts = 20) {
            let attempts = 0;
            const checkInterval = setInterval(() => {
                attempts++;
                if (typeof firebase !== 'undefined') {
                    clearInterval(checkInterval);
                    console.log('â Firebase SDK carregado com sucesso');

                    console.log(`âł Aguardando Firebase SDK (tentativa ${attempts}/${maxAttempts})...`);
                }
            }, 500);
        }

        // Salvar dados no Firebase (escopo compartilhado entre contas)
        async function saveToFirebase(dataKey, data) {
            if (!firebaseInitialized || !db) return;

            try {
                const safeDataKey = normalizeFirebasePathSegment(dataKey);
                const path = `marimbondos/shared/${safeDataKey}`;

                // Timeout de 5 segundos para evitar travamentos
                const timeoutPromise = new Promise((_, reject) =>
                    setTimeout(() => reject(new Error('Timeout ao salvar no Firebase')), 5000)
                );

                const savePromise = db.ref(path).set({
                    data: data,
                    timestamp: new Date().toISOString()
                });

                await Promise.race([savePromise, timeoutPromise]);
                console.log(`â Dados salvos em Firebase: ${dataKey} (path: ${path})`);
            } catch (err) {
                console.error('Erro ao salvar dados em Firebase:', err.message);
                console.warn('â ď¸ Dados salvos apenas localmente');
            }
        }
        async function loadFromFirebase(dataKey) {
            if (!firebaseInitialized || !db) return null;

            try {
                const safeDataKey = normalizeFirebasePathSegment(dataKey);
                const path = `marimbondos/shared/${safeDataKey}`;

                // Timeout de 5 segundos para evitar travamentos
                const timeoutPromise = new Promise((_, reject) =>
                    setTimeout(() => reject(new Error('Timeout ao carregar do Firebase')), 5000)
                );

                const loadPromise = db.ref(path).once('value');
                const snapshot = await Promise.race([loadPromise, timeoutPromise]);

                if (snapshot.exists()) {
                    console.log(`â Dados carregados do Firebase: ${dataKey} (path: ${path})`);
                    return snapshot.val().data;
                }
                return null;
            } catch (err) {
                console.error('Erro ao carregar dados do Firebase:', err.message);
                return null;
            }
        }

        // Configurar sincronizaĂ§ĂŁo em tempo real com Firebase
        function setupRealtimeSync() {
            console.log('đ setupRealtimeSync() chamado | Firebase:', firebaseInitialized, '| DB:', !!db);
            
            if (!firebaseInitialized || !db) {
                console.warn('â ď¸ Firebase nĂŁo inicializado, nĂŁo configurando listener');

                const listenerKey = 'shared';
                const path = `marimbondos/shared/all_data`;

                if (firebaseListeners[listenerKey]) {
                    firebaseListeners[listenerKey].off();
                    delete firebaseListeners[listenerKey];
                }

                // Configurar novo listener
                firebaseListeners[listenerKey] = db.ref(path);

                                    localStorage.setItem('last_sync_timestamp', remoteTimestamp.toISOString());

                                    console.log('â Dados sincronizados automaticamente do Firebase');
                                    console.log('Dados remotos:', {

        // --- RESET SEMANAL DE CRĂDITOS POR PROFESSOR ---
        function resetWeeklyCredits(force = false) {
            const now = new Date();
            const year = now.getFullYear();
            const jan1 = new Date(year, 0, 1);
            const days = Math.floor((now - jan1) / 86400000);
            const week = Math.ceil((days + jan1.getDay() + 1) / 7);
            const weekKey = `${year}-W${week}`;
            const lastReset = localStorage.getItem('marimbondos_last_weekly_reset');

            if (!force && lastReset === weekKey) {
                return;
            }

            MOCK_STUDENTS.forEach(student => {
                if (student.weekCredits && typeof student.weekCredits === 'object') {
                    Object.keys(student.weekCredits).forEach(prof => {
                        student.weekCredits[prof] = 0;
                    });
                }
            });

            localStorage.setItem('marimbondos_last_weekly_reset', weekKey);
            saveAllData();
            console.log('â CrĂŠditos semanais resetados para todos os alunos/professores.');
        }

        function addHistory(title, desc, type, studentIdOrData = null, deletionType = 'student') {
            let processedDesc = desc;

            const valueMatch = desc.match(/M\$ \d+(\.\d+)?/g);
            if (valueMatch) {
                valueMatch.forEach(match => {
                    let colorClass = 'text-slate-800';
                    if (type === 'credit' || title.toLowerCase().includes('crĂŠdito')) colorClass = 'text-green-600';
                    if (type === 'debit' || title.toLowerCase().includes('dĂŠbito')) colorClass = 'text-red-600';
                    
                    processedDesc = processedDesc.replace(match, `<b class="${colorClass} history-value-chip">${match}</b>`);
                });
            }

            const entry = {
                id: historyCounter++,
                date: new Date().toLocaleString('pt-BR'),
                author: MOCK_USER.name,
                title: title,
                desc: processedDesc,
                type: type,// 'transaction', 'edit', 'deletion', 'creation', etc.
                deletionType: deletionType // 'student' ou 'teacher' para diferenciar exclusĂľes
            };

            if (type === 'deletion') {
                entry.studentData = studentIdOrData;
                entry.studentId = studentIdOrData.id;
            } else if (typeof studentIdOrData === 'number') {
                entry.studentId = studentIdOrData;
            } else if (studentIdOrData && studentIdOrData.id) {
                entry.studentId = studentIdOrData.id;
            }

            MOCK_HISTORY.unshift(entry);
            saveAllData();
        }

            const student = MOCK_STUDENTS.find(s => s.id === id);

            window.pendingBanStudentId = id; // Armazenar ID globalmente
            confirmAction(
                `${action.charAt(0).toUpperCase() + action.slice(1)} Aluno`, 
                `Deseja realmente ${action} o(a) aluno(a) ${student.name}?`, 
                "executeBanStudent",

            );

        function executeBanStudent() {
            const id = window.pendingBanStudentId;
            const student = MOCK_STUDENTS.find(s => s.id === id);

            student.banned = !student.banned;
            const status = student.banned ? "Banido" : "Desbanido";
            showToast(`Aluno ${status.toLowerCase()}!`, student.banned ? "error" : "success");
            addHistory(`${status} Aluno`, `${student.name} foi ${status.toLowerCase()}.`, 'edit', student.id);
            saveAllData();
            openClassDetails(student.class);
            window.pendingBanStudentId = null;
        }

        function saveTeacherEdit(oldEmail) {
            const teacher = MOCK_TEACHERS.find(t => t.email === oldEmail);
            if (!teacher) return;

            const newName = document.getElementById('edit-teacher-name').value.trim();
            const newEmail = document.getElementById('edit-teacher-email').value.trim();
            const newPassword = document.getElementById('edit-teacher-password').value.trim();
            const newRole = document.getElementById('edit-teacher-role').value;

            if (!newName) { showToast("O nome nĂŁo pode estar vazio.", "error"); return; }
            if (!newEmail) { showToast("O e-mail nĂŁo pode estar vazio.", "error"); return; }
            if (!newEmail.includes('@')) { showToast("E-mail invĂĄlido.", "error"); return; }
            
            // Validar senha se fornecida
            if (newPassword && (newPassword.length !== 4 || isNaN(newPassword))) { 
                showToast("Senha deve conter exatamente 4 dĂ­gitos.", "error"); 
                return; 
            }

            // Verifica se o novo e-mail jĂĄ existe (e ĂŠ diferente do atual)
            if (newEmail !== oldEmail && MOCK_TEACHERS.find(t => t.email === newEmail)) {
                showToast("Este e-mail jĂĄ estĂĄ cadastrado.", "error");
                return;
            }

            const oldName = teacher.name;
            const oldRole = teacher.role;

            teacher.name = newName;
            teacher.email = newEmail;
            teacher.role = newRole;
            
            // Atualizar senha apenas se uma nova foi fornecida

        function saveNewNotice() {
            const title = document.getElementById('create-notice-title').value.trim();
            const message = document.getElementById('create-notice-message').value.trim();
            const active = document.getElementById('create-notice-active').checked;

            if (!title) { showToast("O tĂ­tulo nĂŁo pode estar vazio.", "error"); return; }
            if (!message) { showToast("A mensagem nĂŁo pode estar vazia.", "error"); return; }

            const newNotice = {
                id: noticesCounter++,
                author: MOCK_USER.email,
                authorName: MOCK_USER.name,
                title: title,
                message: message,
                active: active,
                createdAt: new Date().toLocaleString('pt-BR')
            };

            MOCK_NOTICES.unshift(newNotice);
            addHistory("Novo Aviso", `Aviso "${title}" foi criado.`, 'creation');
            showToast("Aviso criado com sucesso!");
            saveAllData();

            switchTab('notices');

            if (!canEdit) {
                showToast("VocĂŞ nĂŁo tem permissĂŁo para editar este aviso.", "error");

        // --- MODAIS GERAIS ---
        function setModalBackdropHandler(handler = null) {
            window.modalBackdropHandler = typeof handler === 'function' ? handler : null;
        }

        function openModal(contentHtml) {
            const modal = document.getElementById('global-modal');
            const content = document.getElementById('global-modal-content');
            const shell = modal.querySelector('.modal-scroll-shell');
            modal.classList.remove('modal-closing', 'opacity-0');
            content.classList.remove('modal-closing', 'scale-95');
            modal.style.animation = 'none';
            content.style.animation = 'none';
            void modal.offsetWidth;
            content.innerHTML = contentHtml;
            modal.classList.remove('hidden');
            if (shell) shell.scrollTop = 0;
            content.scrollTop = 0;
            
            // Adiciona listener para fechar ao clicar fora (no backdrop)
            modal.onclick = function(event) {
                if (event.target === modal) {
                    if (typeof window.modalBackdropHandler === 'function') {
                        window.modalBackdropHandler();
                        return;
                    }
                    closeModal();
                }
            };
            
            setTimeout(() => { 
                modal.style.animation = '';
                content.style.animation = '';
                modal.classList.remove('opacity-0'); 
                content.classList.remove('scale-95'); 
            }, 10);
            initIcons();
            enhanceInteractiveElements(content);
        }

        function closeModal() {
            const modal = document.getElementById('global-modal');
            const content = document.getElementById('global-modal-content');
            setModalBackdropHandler(null);
            modal.classList.add('modal-closing');
            content.classList.add('modal-closing');
            modal.classList.add('opacity-0'); 
            content.classList.add('scale-95');
            setTimeout(() => { 
                modal.classList.add('hidden');
                modal.classList.remove('modal-closing', 'opacity-0');
                content.classList.remove('modal-closing', 'scale-95');
                modal.onclick = null; // Remove o listener
            }, 360);
        }

        function normalizeImportKey(value) {
            return String(value || '')
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .toLowerCase()
                .trim();
        }

        function normalizeImportToken(value) {
            return normalizeImportKey(value).replace(/[^a-z]/g, '');
        }

        function normalizeLearnedImportValue(value, kind = 'given') {
            if (kind === 'compound') {
                return String(value || '')
                    .split(' ')
                    .map(part => normalizeImportToken(part))
                    .filter(Boolean)
                    .join(' ')
                    .trim();
            }

            return normalizeImportToken(value);
        }

        function getLearnedImportKindLabel(kind) {
            if (kind === 'compound') return 'Composto';
            if (kind === 'surname') return 'Sobrenome';
            return 'Nome';
        }

        function syncLearnedImportNameCaches() {
            LEARNED_GIVEN_NAMES = new Set();
            LEARNED_SURNAME_NAMES = new Set();
            LEARNED_COMPOUND_NAMES = new Set();
            LEARNED_IMPORT_NAMES = (Array.isArray(LEARNED_IMPORT_NAMES) ? LEARNED_IMPORT_NAMES : [])
                .map(entry => {
                    const kind = entry && (entry.kind === 'compound' || entry.kind === 'surname') ? entry.kind : 'given';
                    const normalized = normalizeLearnedImportValue(entry?.normalized || entry?.value || '', kind);
                    if (!normalized) return null;

                    const displayValue = kind === 'compound'
                        ? normalized.split(' ').map(formatImportedNamePiece).join(' ')
                        : formatImportedNamePiece(normalized);

                    const normalizedEntry = {
                        id: entry?.id || `${kind}:${normalized}`,
                        kind,
                        value: displayValue,
                        normalized,
                        source: entry?.source || 'ImportaĂ§ĂŁo confirmada',
                        addedAt: entry?.addedAt || new Date().toISOString()
                    };

                    if (kind === 'compound') {
                        LEARNED_COMPOUND_NAMES.add(normalized);
                    } else if (kind === 'surname') {
                        LEARNED_SURNAME_NAMES.add(normalized);
                    } else {
                        LEARNED_GIVEN_NAMES.add(normalized);
                    }

                    return normalizedEntry;
                })
                .filter(Boolean)
                .sort((a, b) => a.value.localeCompare(b.value, 'pt-BR'));
        }

        function addLearnedImportName(kind, value, source = 'ImportaĂ§ĂŁo confirmada') {
            const normalized = normalizeLearnedImportValue(value, kind);
            if (!normalized) return false;

            const exists = LEARNED_IMPORT_NAMES.some(entry => entry.kind === kind && entry.normalized === normalized);
            if (exists) return false;

            LEARNED_IMPORT_NAMES.push({
                id: `${kind}:${normalized}`,
                kind,
                value: kind === 'compound' ? normalized.split(' ').map(formatImportedNamePiece).join(' ') : formatImportedNamePiece(normalized),
                normalized,
                source,
                addedAt: new Date().toISOString()
            });
            syncLearnedImportNameCaches();
            return true;
        }

        function learnImportedNamePatterns(name, source = 'ImportaĂ§ĂŁo confirmada') {
            const normalizedName = sanitizeImportedName(name);
            const candidate = scoreImportedNameCandidate(normalizedName);
            const words = candidate.significantWords.map(word => formatImportedNamePiece(word)).filter(Boolean);
            if (words.length < 2) return 0;

            let learnedCount = 0;
            const firstToken = normalizeImportToken(words[0]);
            if (firstToken && !COMMON_BRAZILIAN_GIVEN_NAMES.has(firstToken) && !COMMON_BRAZILIAN_SURNAMES.has(firstToken)) {
                learnedCount += addLearnedImportName('given', words[0], source) ? 1 : 0;
            }

            const shouldLearnSecondToken = words[1]
                && candidate.recognizedSurnames.length === 0
                && words.length <= 3;

            if (shouldLearnSecondToken) {
                const secondToken = normalizeImportToken(words[1]);
                if (secondToken && !COMMON_BRAZILIAN_GIVEN_NAMES.has(secondToken) && !COMMON_BRAZILIAN_SURNAMES.has(secondToken)) {
                    learnedCount += addLearnedImportName('given', words[1], source) ? 1 : 0;
                }

                learnedCount += addLearnedImportName('compound', `${words[0]} ${words[1]}`, source) ? 1 : 0;
            }

            const lastWord = words[words.length - 1];
            const lastToken = normalizeImportToken(lastWord);
            if (lastToken && !COMMON_BRAZILIAN_GIVEN_NAMES.has(lastToken) && !COMMON_BRAZILIAN_SURNAMES.has(lastToken) && !LEARNED_GIVEN_NAMES.has(lastToken)) {
                learnedCount += addLearnedImportName('surname', lastWord, source) ? 1 : 0;
            }

            return learnedCount;
        }

        function getLearnedImportNamesByKind(kind) {

        function resolveImportRecognitionSource(name, mode = 'auto') {

            const learnedSurnameMatch = candidate.significantWords.some(word => LEARNED_SURNAME_NAMES.has(normalizeImportToken(word)));
            const firstPair = candidate.significantWords.length >= 2
                ? `${normalizeImportToken(candidate.significantWords[0])} ${normalizeImportToken(candidate.significantWords[1])}`
                : '';
            const learnedCompoundMatch = firstPair ? LEARNED_COMPOUND_NAMES.has(firstPair) : false;

            if (mode === 'manual') {
                return {
                    label: candidate.score >= 7 ? 'RevisĂŁo Manual Forte' : 'RevisĂŁo Manual',
                    tone: candidate.score >= 7 ? 'bg-amber-100 text-amber-800' : 'bg-slate-200 text-slate-700',
                    helper: candidate.score >= 7 ? 'Linha manual com nome plausĂ­vel e turma vĂĄlida.' : 'Entrada revisada manualmente pelo usuĂĄrio.'
                };
            }

            if (learnedCompoundMatch || learnedGivenMatch || learnedSurnameMatch) {
                return {

        function escapeRegex(value) {

        function parseImportedAee(value) {
            const normalized = normalizeImportKey(value);
            return normalized === 'sim'
                || normalized === 'true'
                || normalized === '1'
                || normalized.includes('aee')
                || normalized.includes('especial')
                || /\bpcd\b/.test(normalized)
                || /\btea\b/.test(normalized);
        }

        function resolveImportedClass(value, fallbackClass = '') {
            const normalizedValue = normalizeImportKey(value);
            if (!normalizedValue) return fallbackClass || '';

            const directMatch = FIXED_CLASSES.find(className => normalizeImportKey(className) === normalizedValue);
            if (directMatch) return directMatch;

            const flexibleMatch = FIXED_CLASSES.find(className => {
                const normalizedClass = normalizeImportKey(className);
                const compactClass = normalizedClass.replace(/[^a-z0-9]/g, '');
                const compactValue = normalizedValue.replace(/[^a-z0-9]/g, '');
                return normalizedValue.includes(normalizedClass) || normalizedClass.includes(normalizedValue) || compactValue.includes(compactClass) || compactClass.includes(compactValue);
            });

            return flexibleMatch || fallbackClass || '';
        }

        function findImportedClassInText(text) {
            const normalizedText = normalizeImportKey(text);
            return resolveImportedClass(normalizedText, '');
        }

        function createImportedStudent(name, className, aee = false) {
