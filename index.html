<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="app-version" content="1.0.0">
    <meta name="application-name" content="Marimbondos Pay">
    <meta name="theme-color" content="#FFB800">
    <title>Marimbondos Pay</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 128 128'%3E%3Cdefs%3E%3ClinearGradient id='wing' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0%25' stop-color='%23ffffff' stop-opacity='0.94'/%3E%3Cstop offset='100%25' stop-color='%23bfdbfe' stop-opacity='0.58'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x='10' y='10' width='108' height='108' rx='30' fill='%23FFB800'/%3E%3Crect x='10' y='10' width='108' height='108' rx='30' fill='none' stroke='%23F59E0B' stroke-width='4'/%3E%3Cellipse cx='52' cy='46' rx='18' ry='11' fill='url(%23wing)' transform='rotate(-22 52 46)'/%3E%3Cellipse cx='76' cy='46' rx='18' ry='11' fill='url(%23wing)' transform='rotate(22 76 46)'/%3E%3Ccircle cx='43' cy='63' r='9' fill='%231F2937'/%3E%3Ccircle cx='40' cy='60' r='1.8' fill='%23F8FAFC'/%3E%3Crect x='50' y='48' width='34' height='30' rx='15' fill='%231F2937'/%3E%3Crect x='58' y='48' width='8' height='30' rx='4' fill='%23FFD54A'/%3E%3Crect x='70' y='48' width='7' height='30' rx='3.5' fill='%23FFD54A'/%3E%3Cpath d='M84 62l12 3l-10 7z' fill='%231F2937'/%3E%3C/svg%3E">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 128 128'%3E%3Cdefs%3E%3ClinearGradient id='wing' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0%25' stop-color='%23ffffff' stop-opacity='0.94'/%3E%3Cstop offset='100%25' stop-color='%23bfdbfe' stop-opacity='0.58'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x='10' y='10' width='108' height='108' rx='30' fill='%23FFB800'/%3E%3Crect x='10' y='10' width='108' height='108' rx='30' fill='none' stroke='%23F59E0B' stroke-width='4'/%3E%3Cellipse cx='52' cy='46' rx='18' ry='11' fill='url(%23wing)' transform='rotate(-22 52 46)'/%3E%3Cellipse cx='76' cy='46' rx='18' ry='11' fill='url(%23wing)' transform='rotate(22 76 46)'/%3E%3Ccircle cx='43' cy='63' r='9' fill='%231F2937'/%3E%3Ccircle cx='40' cy='60' r='1.8' fill='%23F8FAFC'/%3E%3Crect x='50' y='48' width='34' height='30' rx='15' fill='%231F2937'/%3E%3Crect x='58' y='48' width='8' height='30' rx='4' fill='%23FFD54A'/%3E%3Crect x='70' y='48' width='7' height='30' rx='3.5' fill='%23FFD54A'/%3E%3Cpath d='M84 62l12 3l-10 7z' fill='%231F2937'/%3E%3C/svg%3E">
    
    <!-- Frameworks e Fontes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Configurar Tailwind para produção
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        'outfit': ['Outfit', 'sans-serif'],
                        'jakarta': ['Plus Jakarta Sans', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="vendor/xlsx.min.js"></script>
    <script src="vendor/mammoth.browser.min.js"></script>
    <script src="vendor/pdf.min.js"></script>
    <!-- Firebase (Compat para manter firebase.database() estilo legado) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

    <link rel="stylesheet" href="styles.css">

</head>
<body class="min-h-screen app-booting">

    <!-- NOTIFICAÇÕES TOAST -->
    <div id="toast-container" class="fixed bottom-24 left-1/2 -translate-x-1/2 md:bottom-5 md:left-auto md:right-5 md:translate-x-0 z-[140] flex flex-col gap-3 items-center md:items-end w-full max-w-[90%] md:w-auto"></div>
    <input type="file" id="student-import-file" accept=".xlsx,.xls,.docx,.pdf,.txt" class="hidden" onchange="importStudentListFile(event)">

    <!-- TELA DE LOGIN -->
    <div id="login-screen" class="fixed inset-0 bg-slate-100 z-[90] flex items-center justify-center p-4 overflow-y-auto">
        <div id="login-panel" class="max-w-md w-full glass p-8 rounded-[2.5rem] shadow-2xl border border-white animate-in my-auto">
            <div id="login-panel-inner">
                <div id="login-form-shell">
                    <div class="text-center mb-8">
                        <div id="login-logo-badge" class="bg-amber-400 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-4 shadow-lg bee-float">
                            <span class="marimbondo-logo marimbondo-logo-lg" aria-hidden="true">
                                <span class="marimbondo-wing left"></span>
                                <span class="marimbondo-wing right"></span>
                                <span class="marimbondo-antenna left"></span>
                                <span class="marimbondo-antenna right"></span>
                                <span class="marimbondo-head"></span>
                                <span class="marimbondo-thorax"></span>
                                <span class="marimbondo-abdomen"></span>
                                <span class="marimbondo-sting"></span>
                            </span>
                            <span id="login-logo-theme-accent" class="login-logo-theme-accent hidden" aria-hidden="true"></span>
                        </div>
                        <h1 class="text-3xl font-black font-outfit text-slate-800 tracking-tight uppercase">Marimbondos Pay</h1>
                        <p class="text-slate-500 font-medium text-sm mt-1">EMAI Professor Paulo Freire</p>
                        <span id="login-version-badge" class="inline-block mt-2 px-3 py-1 bg-amber-100 text-amber-800 border border-amber-200 text-[10px] font-black rounded-full uppercase tracking-widest shadow-sm">Versão 1.0</span>
                    </div>

                    <div id="login-instructions" class="bg-amber-50 border border-amber-100 p-4 rounded-2xl mb-6">
                        <div class="flex gap-3">
                            <i data-lucide="info" class="w-5 h-5 text-amber-600 shrink-0"></i>
                            <p id="login-theme-copy" class="text-[11px] text-amber-800 leading-relaxed">
                                <strong>INSTRUÇÕES:</strong> Informe seu e-mail e a senha numérica de 4 dígitos. Acesso restrito a funcionários.
                            </p>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase ml-1 mb-1 tracking-wider">E-mail</label>
                            <input type="email" id="login-email" name="username" placeholder="seu-email@escola.com" autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-amber-400 transition font-medium text-slate-700">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase ml-1 mb-1 tracking-wider">Senha Numérica</label>
                            <input type="password" id="login-pin" name="current-password" maxlength="4" inputmode="numeric" placeholder="••••" autocomplete="current-password" autocapitalize="none" autocorrect="off" spellcheck="false" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-amber-400 transition font-medium text-slate-700 text-center tracking-[0.3em] text-lg">
                        </div>
                        <button id="login-btn" class="w-full bg-amber-400 hover:bg-yellow-500 transition text-slate-800 font-black py-4 rounded-2xl shadow-xl btn-bounce text-sm uppercase tracking-widest flex items-center justify-center gap-2 mt-6">
                            <i data-lucide="log-in" class="w-5 h-5"></i>
                            Entrar no Sistema
                        </button>
                    </div>

                    <div class="mt-8 pt-6 border-t border-slate-100 text-center">
                        <button type="button" onclick="openSupportWhatsApp(event)" class="inline-flex items-center gap-2 px-6 py-3 bg-green-50 text-green-600 rounded-full text-xs font-bold hover:bg-green-100 transition-colors border border-green-100 hover:scale-105 active:scale-95">
                            <i data-lucide="message-circle" class="w-4 h-4"></i> Suporte via WhatsApp
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- DASHBOARD PRINCIPAL -->
    <div id="app-content" class="hidden min-h-screen flex flex-col">
        <header class="bg-white border-b border-slate-200 px-4 sm:px-6 py-3 sm:py-4 flex items-center justify-between sticky top-0 z-40">
            <div class="flex items-center gap-3 min-w-0">
                <div class="bg-amber-400 w-10 h-10 rounded-xl flex items-center justify-center shadow-sm">
                    <span class="marimbondo-logo marimbondo-logo-sm" aria-hidden="true">
                        <span class="marimbondo-wing left"></span>
                        <span class="marimbondo-wing right"></span>
                        <span class="marimbondo-antenna left"></span>
                        <span class="marimbondo-antenna right"></span>
                        <span class="marimbondo-head"></span>
                        <span class="marimbondo-thorax"></span>
                        <span class="marimbondo-abdomen"></span>
                        <span class="marimbondo-sting"></span>
                    </span>
                </div>
                <div class="min-w-0">
                    <p id="user-display-name" class="font-bold text-slate-800 leading-none text-sm truncate">Usuário</p>
                    <p id="user-display-role" class="text-[9px] font-bold text-amber-600 uppercase tracking-tighter mt-1">Cargo</p>
                </div>
            </div>
            <div class="flex items-center gap-2 shrink-0">
                <button onclick="openGlobalAddModal()" class="p-2.5 text-slate-600 hover:bg-slate-100 bg-slate-50 border border-slate-200 rounded-full transition btn-bounce" title="Adicionar Novo">
                    <i data-lucide="user-plus" class="w-5 h-5"></i>
                </button>
                <button onclick="logout()" class="p-2.5 text-slate-400 hover:text-red-500 transition btn-bounce" title="Sair">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <main class="p-3 sm:p-4 max-w-5xl mx-auto space-y-4 w-full flex-1 flex flex-col">
            <!-- NAVEGAÇÃO DINÂMICA (Renderizada via JS) -->
            <div id="nav-container" class="fast-scroll flex bg-slate-100/80 dark:bg-slate-700/50 backdrop-blur-md p-1.5 sm:p-2 rounded-xl sm:rounded-2xl gap-1 overflow-x-auto no-scrollbar shrink-0 shadow-sm border border-amber-200/50 dark:border-amber-500/20 snap-x snap-proximity">
                <!-- Botões gerados aqui -->
            </div>

            <!-- ÁREA DE CONTEÚDO -->
            <div id="tab-content" class="animate-in flex-1 overflow-y-auto overflow-x-hidden" style="overflow-y: auto !important; touch-action: pan-y;">
                <!-- Conteúdo -->
            </div>
        </main>
    </div>

    <!-- MODAIS DO SISTEMA -->
    <div id="global-modal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4 opacity-0 transition-opacity overflow-hidden">
        <div class="modal-scroll-shell">
            <div id="global-modal-content" class="bg-white w-full max-w-2xl rounded-[2rem] p-6 shadow-2xl transform scale-95 transition-transform my-3 md:my-6 mx-auto">
                <!-- Conteúdo Injetado via JS -->
            </div>
        </div>
    </div>

    <script src="learned-names.js"></script>
    <script src="learned-import-modal.js"></script>
    <script src="app.js"></script>
</body>
</html>
