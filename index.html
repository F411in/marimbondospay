<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="app-version" content="1.0.0">
    <meta name="theme-color" content="#FFB800">
    <title>Banco dos Marimbondos - Sistema de Gestão (Versão 1.0.0)</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23FFB800'/><circle cx='35' cy='35' r='8' fill='%2310B981'/><circle cx='65' cy='35' r='8' fill='%2310B981'/><circle cx='50' cy='65' r='12' fill='%23DC2626'/></svg>">
    
    <!-- Frameworks e Fontes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Configurar Tailwind para produção
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        'outfit': ['Outfit', 'sans-serif'],
                        'jakarta': ['Plus Jakarta Sans', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="vendor/xlsx.min.js"></script>
    <script src="vendor/mammoth.browser.min.js"></script>
    <script src="vendor/pdf.min.js"></script>
    <!-- Firebase (Compat para manter firebase.database() estilo legado) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

    <style>
        :root {
            /* Cores Tema Marimbondos */
            --primary: #FFB800;          /* Ouro das abelhas */
            --primary-dark: #F59E0B;     /* Âmbar escuro */
            --secondary: #10B981;        /* Verde da natureza */
            --tertiary: #1F2937;         /* Preto profundo */
            --accent: #FBBF24;           /* Destaque ouro */
            --success: #059669;
            --danger: #DC2626;
            --warning: #F59E0B;
            
            /* Tema Claro - Cinzas Melhorados */
            --bg: #FAF1CC;
            --bg-secondary: #EED79A;
            --bg-card: #FFF7DE;
            --text-primary: #2F2410;
            --text-secondary: #5B4410;
            --text-tertiary: #7C5A10;
            --border: rgba(180, 83, 9, 0.26);
            --shadow: rgba(146, 64, 14, 0.14);
            --surface-1: #FFF2C4;
            --surface-2: #E9CD81;
            --surface-muted: #E0BE62;
            --panel-border: rgba(146, 64, 14, 0.18);
            --panel-shadow: 0 12px 28px rgba(146, 64, 14, 0.12);
        }
        
        html.dark {
            /* Tema Escuro - Marimbondos */
            --bg: #0F0E0C;               /* Preto morno */
            --bg-secondary: #1A1612;
            --bg-card: #2A251F;
            --text-primary: #FEF3C7;     /* Bege claro */
            --text-secondary: #FDE68A;   /* Amarelo claro (era #F3E8FF) */
            --text-tertiary: #FCD34D;    /* Amarelo mais forte (era #BFDBFE) */
            --border: #FBBF24;
            --shadow: rgba(251, 184, 0, 0.2);
            --surface-1: #1F2937;
            --surface-2: #111827;
            --surface-muted: #273449;
            --panel-border: rgba(251, 191, 36, 0.16);
            --panel-shadow: 0 14px 32px rgba(0, 0, 0, 0.30);
        }
        
        * { 
            transition: background-color 0.22s ease, color 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
        }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(16, 185, 129, 0.04) 0%, transparent 42%),
                radial-gradient(circle at 80% 80%, rgba(255, 184, 0, 0.04) 0%, transparent 42%);
            color: var(--text-primary);
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none;
            text-rendering: optimizeLegibility;
        }

        body[data-season-theme]:not([data-season-theme="none"]) header,
        body[data-season-theme]:not([data-season-theme="none"]) #nav-container,
        body[data-season-theme]:not([data-season-theme="none"]) .store-photo-frame,
        body[data-season-theme]:not([data-season-theme="none"]) #global-modal-content,
        body[data-season-theme]:not([data-season-theme="none"]) .bg-white.rounded-2xl,
        body[data-season-theme]:not([data-season-theme="none"]) .history-item,
        body[data-season-theme]:not([data-season-theme="none"]) .ranking-card {
            border-color: color-mix(in srgb, var(--seasonal-highlight, var(--primary)) 28%, var(--panel-border, var(--border))) !important;
            box-shadow: 0 18px 36px color-mix(in srgb, var(--seasonal-highlight-soft, rgba(0, 0, 0, 0.08)) 55%, transparent) !important;
        }

        body[data-season-theme]:not([data-season-theme="none"]) .bg-amber-500,
        body[data-season-theme]:not([data-season-theme="none"]) .bg-slate-900,
        body[data-season-theme]:not([data-season-theme="none"]) button.bg-slate-900 {
            background: linear-gradient(135deg, var(--primary), var(--secondary)) !important;
            color: #ffffff !important;
        }

        body[data-season-theme]:not([data-season-theme="none"]) .bg-amber-500:hover:not(:disabled),
        body[data-season-theme]:not([data-season-theme="none"]) .bg-slate-900:hover:not(:disabled),
        body[data-season-theme]:not([data-season-theme="none"]) button.bg-slate-900:hover:not(:disabled) {
            background: linear-gradient(135deg, color-mix(in srgb, var(--primary-dark) 72%, white 28%), color-mix(in srgb, var(--secondary) 82%, var(--primary) 18%)) !important;
            filter: saturate(1.04) brightness(1.03);
        }

        body[data-season-theme]:not([data-season-theme="none"]) {
            --seasonal-app-shell: color-mix(in srgb, var(--bg-card) 82%, white 18%);
            --seasonal-app-shell-strong: color-mix(in srgb, var(--bg-card) 72%, var(--surface-1) 28%);
            --seasonal-app-muted: color-mix(in srgb, var(--surface-1) 76%, white 24%);
            --seasonal-field-bg: color-mix(in srgb, var(--bg-card) 86%, white 14%);
            --seasonal-field-border: color-mix(in srgb, var(--primary) 18%, var(--panel-border, var(--border)) 82%);
            --seasonal-focus-ring: color-mix(in srgb, var(--primary) 18%, transparent);
            --seasonal-nav-glow: color-mix(in srgb, var(--secondary) 18%, transparent);
            --seasonal-text-soft: color-mix(in srgb, var(--text-secondary) 82%, var(--text-primary) 18%);
                --seasonal-panel-entrance: none;
                --seasonal-tab-enter-x: 0px;
                --seasonal-tab-enter-y: 16px;
                --seasonal-tab-enter-rotate: 0deg;
                --seasonal-shimmer-gradient: linear-gradient(110deg, transparent 0%, rgba(255, 255, 255, 0.18) 48%, transparent 100%);
                --seasonal-orb-gradient: radial-gradient(circle, color-mix(in srgb, var(--seasonal-highlight, var(--primary)) 72%, white 28%), transparent 72%);
                --seasonal-orb-opacity: 0.22;
                --seasonal-stage-card-gradient: linear-gradient(145deg, rgba(15, 23, 42, 0.78), rgba(30, 41, 59, 0.74));
        }

        body[data-season-theme]:not([data-season-theme="none"]) .bg-white,
        body[data-season-theme]:not([data-season-theme="none"]) .bg-slate-50,
        body[data-season-theme]:not([data-season-theme="none"]) .bg-amber-50,
        body[data-season-theme]:not([data-season-theme="none"]) .bg-white\/95,
        body[data-season-theme]:not([data-season-theme="none"]) .bg-slate-100 {
            background-color: var(--seasonal-app-shell) !important;
        }

        body[data-season-theme]:not([data-season-theme="none"]) .bg-slate-50\/80,
        body[data-season-theme]:not([data-season-theme="none"]) .bg-slate-50\/90,
        body[data-season-theme]:not([data-season-theme="none"]) .bg-slate-100\/80,
        body[data-season-theme]:not([data-season-theme="none"]) .bg-slate-200\/60 {
            background-color: color-mix(in srgb, var(--seasonal-app-shell) 78%, transparent) !important;
            backdrop-filter: blur(16px);
        }

        body[data-season-theme]:not([data-season-theme="none"]) .text-slate-500,
        body[data-season-theme]:not([data-season-theme="none"]) .text-slate-600,
        body[data-season-theme]:not([data-season-theme="none"]) .text-slate-700 {
            color: var(--seasonal-text-soft) !important;
        }

        body[data-season-theme]:not([data-season-theme="none"]) .text-slate-800,
        body[data-season-theme]:not([data-season-theme="none"]) .text-slate-900 {
            color: var(--text-primary) !important;
        }

        body[data-season-theme]:not([data-season-theme="none"]) input,
        body[data-season-theme]:not([data-season-theme="none"]) select,
        body[data-season-theme]:not([data-season-theme="none"]) textarea {
            background-color: var(--seasonal-field-bg) !important;
            border-color: var(--seasonal-field-border) !important;
            color: var(--text-primary) !important;
        }

        body[data-season-theme]:not([data-season-theme="none"]) input::placeholder,
        body[data-season-theme]:not([data-season-theme="none"]) textarea::placeholder {
            color: color-mix(in srgb, var(--text-secondary) 72%, transparent) !important;
        }

        body[data-season-theme]:not([data-season-theme="none"]) #nav-container,
        body[data-season-theme]:not([data-season-theme="none"]) header {
            background: linear-gradient(180deg, color-mix(in srgb, var(--seasonal-app-shell) 88%, white 12%), color-mix(in srgb, var(--seasonal-app-shell-strong) 90%, transparent)) !important;
            backdrop-filter: blur(18px);
        }

        body[data-season-theme]:not([data-season-theme="none"]) #nav-container button,
        body[data-season-theme]:not([data-season-theme="none"]) .student-class-trigger,
        body[data-season-theme]:not([data-season-theme="none"]) .interactive-surface {
            box-shadow: 0 10px 24px var(--seasonal-nav-glow);
        }

        body[data-season-theme]:not([data-season-theme="none"]) #nav-container button:hover,
        body[data-season-theme]:not([data-season-theme="none"]) .student-class-trigger:hover,
        body[data-season-theme]:not([data-season-theme="none"]) .interactive-surface:hover {
            box-shadow: 0 16px 30px color-mix(in srgb, var(--secondary) 22%, transparent);
        }

        body[data-season-theme]:not([data-season-theme="none"]) .seasonal-comfort-chip {
            background: linear-gradient(135deg, color-mix(in srgb, var(--primary) 15%, white 85%), color-mix(in srgb, var(--secondary) 18%, white 82%));
            border: 1px solid color-mix(in srgb, var(--primary) 24%, transparent);
            color: var(--text-primary);
            box-shadow: 0 10px 20px color-mix(in srgb, var(--primary) 10%, transparent);
        }

        body[data-season-theme="pascoa"] {
            --seasonal-pascoa-lilac: #d8bfd0;
            --seasonal-pascoa-mint: #c7debf;
            --seasonal-pascoa-rose: #e8b7a7;
            --seasonal-pascoa-butter: #efcf8c;
            --seasonal-text-soft: #6d5446;
            --seasonal-field-bg: rgba(255, 249, 242, 0.98);
            --seasonal-app-shell: rgba(255, 248, 239, 0.98);
            --seasonal-app-shell-strong: rgba(243, 230, 210, 0.95);
            --seasonal-focus-ring: rgba(190, 131, 80, 0.18);
            --seasonal-nav-glow: rgba(169, 210, 176, 0.18);
        }

        .seasonal-theme-decorations {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 6;
            overflow: hidden;
        }

        .seasonal-theme-scene {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
            opacity: 0.9;
        }

        .seasonal-scene-texture {
            position: absolute;
            inset: -10%;
            opacity: 0.22;
            background-image: var(--seasonal-scene-texture-url, none);
            background-repeat: repeat;
            background-size: 220px;
            mix-blend-mode: soft-light;
            animation: var(--seasonal-motion-secondary, seasonalTextureDrift) 18s linear infinite;
        }

        .seasonal-scene-poster {
            position: absolute;
            width: 170px;
            height: 170px;
            right: 5%;
            top: 14%;
            opacity: 0.16;
            filter: drop-shadow(0 20px 26px rgba(15, 23, 42, 0.12));
            animation: var(--seasonal-motion-primary, seasonalFloat) 9.5s ease-in-out infinite;
        }

        .seasonal-scene-poster img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .seasonal-scene-glow {
            position: absolute;
            border-radius: 999px;
            opacity: 0.2;
            background: radial-gradient(circle, var(--seasonal-highlight, var(--primary)) 0%, transparent 68%);
        }

        .seasonal-scene-ribbon {
            position: absolute;
            display: flex;
            align-items: center;
            gap: 0.55rem;
            padding: 0.55rem 0.9rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 14px 28px rgba(15, 23, 42, 0.10);
            backdrop-filter: blur(8px);
        }

        .seasonal-scene-ribbon span {
            font-size: 1rem;
            line-height: 1;
        }

        .seasonal-pascoa-egg,
        .seasonal-pascoa-spark {
            position: absolute;
            pointer-events: none;
        }

        .seasonal-pascoa-egg {
            width: 3.4rem;
            height: 4.4rem;
            border-radius: 50% 50% 48% 48% / 56% 56% 44% 44%;
            border: 1px solid rgba(255, 251, 246, 0.58);
            box-shadow: 0 18px 34px rgba(97, 62, 35, 0.12);
            backdrop-filter: blur(10px);
            overflow: hidden;
            isolation: isolate;
            animation: seasonalPascoaEggFloat 9s ease-in-out infinite;
        }

        .seasonal-pascoa-egg::after {
            content: '';
            position: absolute;
            inset: 12% 14%;
            border-radius: inherit;
            background:
                linear-gradient(180deg, transparent 0%, transparent 18%, rgba(255, 251, 247, 0.58) 18%, rgba(255, 251, 247, 0.58) 24%, transparent 24%, transparent 47%, rgba(179, 134, 102, 0.18) 47%, rgba(179, 134, 102, 0.18) 54%, transparent 54%, transparent 76%, rgba(255, 251, 247, 0.52) 76%, rgba(255, 251, 247, 0.52) 82%, transparent 82%),
                radial-gradient(circle at 50% 30%, rgba(255, 255, 255, 0.5), transparent 38%);
            opacity: 0.9;
            mix-blend-mode: soft-light;
        }

        .seasonal-pascoa-spark {
            width: 0.75rem;
            height: 0.75rem;
            border-radius: 999px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.98) 0%, color-mix(in srgb, var(--seasonal-pascoa-butter, #efcf8c) 68%, white 32%) 42%, rgba(232, 183, 167, 0.24) 62%, transparent 80%);
            box-shadow: 0 0 22px rgba(239, 207, 140, 0.3);
            opacity: 0.82;
            animation: seasonalPascoaSparkleDrift 5.5s ease-in-out infinite;
        }

        .seasonal-accent-blob,
        .seasonal-accent-dot,
        .seasonal-accent-ring {
            position: absolute;
            pointer-events: none;
        }

        .seasonal-accent-blob {
            border-radius: var(--blob-radius, 42% 58% 57% 43% / 43% 39% 61% 57%);
            border: 1px solid rgba(255, 255, 255, 0.28);
            box-shadow: 0 16px 28px rgba(15, 23, 42, 0.08);
            backdrop-filter: blur(10px);
            animation: seasonalAccentDrift 10s ease-in-out infinite;
        }

        .seasonal-accent-dot {
            width: 0.9rem;
            height: 0.9rem;
            border-radius: 999px;
            box-shadow: 0 0 18px rgba(255, 255, 255, 0.22);
            animation: seasonalAccentPulse 5.5s ease-in-out infinite;
        }

        .seasonal-accent-ring {
            border-radius: 999px;
            border: 1px dashed rgba(255, 255, 255, 0.28);
            opacity: 0.5;
            animation: seasonalAccentRing 12s linear infinite;
        }

        .seasonal-theme-scene.pascoa-scene .seasonal-scene-texture {
            opacity: 0.22;
            mix-blend-mode: soft-light;
        }

        .seasonal-theme-scene.pascoa-scene .seasonal-scene-glow {
            opacity: 0.22;
            background: radial-gradient(circle, rgba(239, 207, 140, 0.32) 0%, rgba(232, 183, 167, 0.14) 42%, transparent 72%);
        }

        .seasonal-theme-scene.pascoa-scene .seasonal-scene-poster {
            opacity: 0.2;
            filter: drop-shadow(0 18px 28px rgba(129, 84, 27, 0.1));
        }

        .seasonal-theme-scene.pascoa-scene .seasonal-scene-ribbon {
            background: linear-gradient(135deg, rgba(255, 251, 246, 0.72), rgba(244, 233, 218, 0.42));
            border-color: rgba(190, 131, 80, 0.22);
        }

        .seasonal-theme-scene.pascoa-scene .seasonal-scene-ribbon strong {
            color: #6b4934;
        }

        .seasonal-showcase.pascoa-showcase {
            background:
                linear-gradient(135deg, color-mix(in srgb, var(--surface-1, var(--bg-card)) 76%, white 24%), color-mix(in srgb, var(--surface-2, var(--bg-secondary)) 82%, white 18%)),
                radial-gradient(circle at 16% 18%, rgba(232, 183, 167, 0.26), transparent 28%),
                radial-gradient(circle at 84% 18%, rgba(199, 222, 191, 0.3), transparent 24%),
                radial-gradient(circle at 58% 86%, rgba(216, 191, 208, 0.18), transparent 24%),
                linear-gradient(0deg, rgba(255, 251, 247, 0.52), rgba(255, 251, 247, 0.52));
        }

        .seasonal-showcase.pascoa-showcase::before {
            background: radial-gradient(circle, rgba(239, 207, 140, 0.18) 0%, transparent 68%);
        }

        .seasonal-showcase.pascoa-showcase .seasonal-showcase-title {
            color: #583928 !important;
        }

        .seasonal-showcase.pascoa-showcase .seasonal-showcase-copy,
        .seasonal-showcase.pascoa-showcase .seasonal-showcase-chip,
        .seasonal-showcase.pascoa-showcase .seasonal-showcase-kicker {
            color: #735743 !important;
        }

        .seasonal-showcase.pascoa-showcase .seasonal-showcase-kicker,
        .seasonal-showcase.pascoa-showcase .seasonal-showcase-chip {
            background: linear-gradient(135deg, rgba(255, 252, 249, 0.82), rgba(245, 235, 223, 0.72));
            border-color: rgba(190, 131, 80, 0.18);
        }

        .seasonal-showcase.pascoa-showcase .seasonal-showcase-stage {
            background:
                linear-gradient(180deg, rgba(255, 253, 250, 0.58), rgba(255, 249, 242, 0.28)),
                radial-gradient(circle at top left, rgba(232, 183, 167, 0.3), transparent 34%),
                radial-gradient(circle at top right, rgba(199, 222, 191, 0.34), transparent 30%),
                linear-gradient(135deg, color-mix(in srgb, var(--surface-1) 76%, white 24%), color-mix(in srgb, var(--surface-2) 72%, white 28%));
        }

        .seasonal-showcase.pascoa-showcase .seasonal-showcase-stage::before {
            opacity: 0.22;
        }

        .seasonal-showcase.pascoa-showcase .seasonal-showcase-card {
            background: linear-gradient(145deg, rgba(100, 68, 43, 0.92), rgba(145, 103, 69, 0.84));
            box-shadow: 0 24px 36px rgba(100, 68, 43, 0.16);
        }

        .seasonal-showcase.pascoa-showcase .seasonal-showcase-credit {
            color: rgba(91, 61, 36, 0.62);
        }

        .seasonal-showcase.pascoa-showcase .seasonal-showcase-figure {
            background: radial-gradient(circle at 30% 28%, rgba(255, 255, 255, 0.86), rgba(247, 236, 224, 0.42));
            border-color: rgba(190, 131, 80, 0.28);
        }

        .seasonal-showcase.pascoa-showcase .seasonal-showcase-motif {
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.9), rgba(248, 238, 228, 0.56));
            box-shadow: 0 18px 28px rgba(150, 113, 74, 0.1);
        }

        .seasonal-showcase {
            position: relative;
            overflow: hidden;
            border: 1px solid color-mix(in srgb, var(--seasonal-highlight, var(--primary)) 30%, var(--panel-border, var(--border)));
            background:
                linear-gradient(135deg, color-mix(in srgb, var(--surface-1, var(--bg-card)) 86%, white 14%), color-mix(in srgb, var(--surface-2, var(--bg-secondary)) 78%, white 22%)),
                radial-gradient(circle at top right, color-mix(in srgb, var(--seasonal-highlight, var(--primary)) 18%, transparent), transparent 42%);
            box-shadow: 0 24px 42px color-mix(in srgb, var(--seasonal-highlight-soft, rgba(15, 23, 42, 0.08)) 78%, transparent);
        }

        .seasonal-showcase::before {
            content: '';
            position: absolute;
            inset: auto -10% -40% auto;
            width: 220px;
            height: 220px;
            border-radius: 999px;
            background: radial-gradient(circle, color-mix(in srgb, var(--seasonal-highlight, var(--primary)) 30%, transparent), transparent 72%);
            opacity: 0.65;
        }

        .seasonal-showcase-grid {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: minmax(0, 1.25fr) minmax(220px, 0.75fr);
            gap: 1rem;
            align-items: stretch;
        }

        .seasonal-showcase-kicker {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            padding: 0.42rem 0.8rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.42);
            border: 1px solid rgba(255, 255, 255, 0.38);
            font-size: 0.63rem;
            font-weight: 900;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--text-primary);
        }

        .seasonal-showcase-title {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(1.4rem, 2.5vw, 2.2rem);
            line-height: 0.98;
            letter-spacing: -0.04em;
        }

        .seasonal-showcase-copy {
            max-width: 56ch;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .seasonal-showcase-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.55rem;
        }

        .seasonal-showcase-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.38rem;
            padding: 0.5rem 0.78rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.48);
            border: 1px solid rgba(255, 255, 255, 0.34);
            box-shadow: 0 8px 16px rgba(15, 23, 42, 0.06);
            font-size: 0.69rem;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .seasonal-showcase-stage {
            position: relative;
            min-height: 190px;
            border-radius: 1.55rem;
            border: 1px solid rgba(255, 255, 255, 0.28);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.32), rgba(255, 255, 255, 0.12));
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.28);
            overflow: hidden;
        }

        /* ===== ANIMAÇÕES MARIMBONDOS ===== */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes softRise {
            from { opacity: 0; transform: translateY(18px) scale(0.985); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes touchPulse {
            0% { transform: scale(1); }
            50% { transform: scale(0.975); }
            100% { transform: scale(1); }
        }

        @keyframes toastSlideIn {
            from { opacity: 0; transform: translateY(-12px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes shimmerSweep {
            from { transform: translateX(-135%); opacity: 0; }
            35% { opacity: 0.18; }
            to { transform: translateX(135%); opacity: 0; }
        }
        
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 5px rgba(255, 184, 0, 0.3), inset 0 0 10px rgba(255, 184, 0, 0.1); }
            50% { box-shadow: 0 0 20px rgba(255, 184, 0, 0.6), inset 0 0 15px rgba(255, 184, 0, 0.2); }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes honeycomb {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.05); }
            100% { transform: rotate(360deg) scale(1); }
        }
        
        .animate-in { animation: fadeIn 0.6s ease-out forwards; }
        .animate-slide { animation: slideInLeft 0.6s ease-out forwards; }
        .animate-scale { animation: scaleIn 0.5s ease-out forwards; }
        .animate-pulse { animation: pulse 2s ease-in-out infinite; }
        .animate-glow { animation: glow 3s ease-in-out infinite; }
        .bee-float { animation: float 4s ease-in-out infinite; }
        .animate-slideUp { animation: slideUp 0.7s ease-out forwards; }
        .animate-honeycomb { animation: honeycomb 20s linear infinite; }

            will-change: opacity, transform, filter;
        }

        .tab-pane-shell.is-visible {

            transform: translate3d(0, 0, 0) scale(1);
            filter: blur(0);
                animation: var(--seasonal-panel-entrance, none);

        .tab-pane-shell.is-leaving {

            transform: translate3d(0, -10px, 0) scale(0.992);

        }

        @media (prefers-reduced-motion: reduce) {
            .tab-pane-shell,
            .tab-pane-shell.is-visible,

    <script>
        // --- SISTEMA DE PERSISTÊNCIA COM LOCALSTORAGE ---
        class DataPersistence {
            constructor() {
                this.storageKey = 'marimbondos_db';
                this.dbName = 'MarimbondosDB';
                this.storeName = 'appData';
                this.db = null;
                this.initIndexedDB();
            }

            initIndexedDB() {
                if (!('indexedDB' in window)) {
                    console.warn('IndexedDB não disponível, usando localStorage');
                    return;
                }
                
                const request = indexedDB.open(this.dbName, 1);
                
                request.onerror = () => {
                    console.error('Erro ao abrir IndexedDB');
                };
                
                request.onsuccess = (e) => {
                    this.db = e.target.result;
                    console.log('✓ IndexedDB inicializado');
                };
                
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(this.storeName)) {
                        db.createObjectStore(this.storeName);
                    }
                };
            }

            save(data) {
                // Tentar salvar em IndexedDB primeiro
                if (this.db) {
                    try {
                        const transaction = this.db.transaction([this.storeName], 'readwrite');
                        const store = transaction.objectStore(this.storeName);
                        store.put(data, this.storageKey);
                        console.log('✓ Dados salvos em IndexedDB');
                    } catch(err) {
                        console.warn('Erro ao salvar em IndexedDB:', err);
                        // Fallback para localStorage
                        this.saveToLocalStorage(data);
                    }
                } else {
                    // Usar localStorage como fallback
                    this.saveToLocalStorage(data);
                }
            }

            saveToLocalStorage(data) {
                try {
                    localStorage.setItem(this.storageKey, JSON.stringify(data));
                    console.log('✓ Dados salvos em localStorage');
                } catch(err) {
                    console.error('Erro ao salvar em localStorage:', err);
                }
            }

            load() {
                // Tentar carregar de IndexedDB primeiro
                if (this.db) {
                    return new Promise((resolve) => {
                        try {
                            const transaction = this.db.transaction([this.storeName], 'readonly');
                            const store = transaction.objectStore(this.storeName);
                            const request = store.get(this.storageKey);
                            
                            request.onsuccess = () => {
                                if (request.result) {
                                    console.log('✓ Dados carregados de IndexedDB');
                                    resolve(request.result);
                                } else {
                                    // Fallback para localStorage
                                    resolve(this.loadFromLocalStorage());
                                }
                            };
                            
                            request.onerror = () => {
                                console.warn('Erro ao carregar de IndexedDB');
                                resolve(this.loadFromLocalStorage());
                            };
                        } catch(err) {
                            console.warn('Erro ao acessar IndexedDB:', err);
                            resolve(this.loadFromLocalStorage());
                        }
                    });
                } else {
                    // Usar localStorage diretamente
                    return Promise.resolve(this.loadFromLocalStorage());
                }
            }

            loadFromLocalStorage() {
                try {
                    const data = localStorage.getItem(this.storageKey);
                    if (data) {
                        console.log('✓ Dados carregados de localStorage');
                        return JSON.parse(data);
                    }
                    return null;
                } catch(err) {
                    console.error('Erro ao carregar de localStorage:', err);
                    return null;
                }
            }

            clear() {
                // Limpar IndexedDB
                if (this.db) {
                    try {
                        const transaction = this.db.transaction([this.storeName], 'readwrite');
                        const store = transaction.objectStore(this.storeName);
                        store.delete(this.storageKey);
                    } catch(err) {
                        console.warn('Erro ao limpar IndexedDB:', err);
                    }
                }
                
                // Limpar localStorage
                try {
                    localStorage.removeItem(this.storageKey);
                } catch(err) {
                    console.error('Erro ao limpar localStorage:', err);
                }
            }
        }

        const persistence = new DataPersistence();

        // --- CONFIGURAÇÃO FIREBASE ---
        // ⚠️ IMPORTANTE: Você precisa configurar suas credenciais do Firebase
        // Siga os passos:
        // 1. Vá para https://console.firebase.google.com
        // 2. Crie um novo projeto ou use um existente
        // 3. Copie os dados de configuração do seu projeto
        // 4. Cole as informações abaixo:
        
        const firebaseConfig = {
            apiKey: "AIzaSyAef3eDWhfs7KhLGFjn5rEsPktyPNckOrI",
            authDomain: "banco-dos-marimbondos.firebaseapp.com",
            projectId: "banco-dos-marimbondos",
            storageBucket: "banco-dos-marimbondos.appspot.com",
            messagingSenderId: "450318154980",
            appId: "1:450318154980:web:249c6899ffc310703f00f1"
        };

        let firebaseInitialized = false;
        let firebaseUser = null;
        let db = null;
        let firebaseListeners = {}; // Armazenar listeners ativos para limpeza
        let lastAppliedRemoteTimestamp = '';
        let lastAppliedRemoteSignature = '';
        let uiRefreshTimer = null;
        let firebaseSyncTimer = null;
        let pendingFirebaseState = null;
        let pendingFirebaseSignature = '';
        let firebaseSyncInFlight = false;
        let firebaseSyncRetryRequested = false;
        const FIREBASE_SYNC_DEBOUNCE_MS = 450;

        function normalizeFirebasePathSegment(segment) {
            if (!segment || typeof segment !== 'string') return 'local';
            return segment
                .trim()
                .replace(/\./g, '_')
                .replace(/\#/g, '_')
                .replace(/\$/g, '_')
                .replace(/\[/g, '_')
                .replace(/\]/g, '_')
                .replace(/\//g, '_')
                .replace(/@/g, '_at_')
                .replace(/\s+/g, '_')
                .replace(/[^a-zA-Z0-9_\-]/g, '_') || 'local';
        }

        function withAsyncTimeout(promise, timeoutMs, timeoutMessage) {
            let timeoutId = null;

            const timeoutPromise = new Promise((_, reject) => {
                timeoutId = setTimeout(() => reject(new Error(timeoutMessage)), timeoutMs);
            });

            return Promise.race([promise, timeoutPromise]).finally(() => {
                if (timeoutId !== null) clearTimeout(timeoutId);
            });
        }

        // Aguardar Firebase estar disponível
        function waitForFirebase(callback, maxAttempts = 20) {
            let attempts = 0;
            const checkInterval = setInterval(() => {
                attempts++;
                if (typeof firebase !== 'undefined') {
                    clearInterval(checkInterval);
                    console.log('✓ Firebase SDK carregado com sucesso');
                    callback();
                } else if (attempts >= maxAttempts) {
                    clearInterval(checkInterval);
                    console.error('❌ Firebase SDK não carregou após múltiplas tentativas');
                    console.warn('⚠️ Firebase não disponível. Usando localStorage apenas.');
                    firebaseInitialized = false;
                    callback(); // Chamar callback mesmo assim para continuar o app
                } else {
                    console.log(`⏳ Aguardando Firebase SDK (tentativa ${attempts}/${maxAttempts})...`);
                }
            }, 500);
        }

        // Inicializar Firebase
        function initFirebase() {
            try {
                // Verificar se firebase está definido
                if (typeof firebase === 'undefined') {
                    console.error('❌ Firebase SDK ainda não foi carregado');
                    throw new Error('Firebase não está disponível. Tentando novamente...');
                }

                // Verificar se está usando placeholder (não configurado)
                if (firebaseConfig.apiKey.includes("COLE_SEU") || 
                    firebaseConfig.projectId.includes("COLE_SEU") ||
                    firebaseConfig.apiKey === "") {
                    console.warn('⚠️ Firebase não configurado. Usando localStorage apenas.');
                    firebaseInitialized = false;
                    return false;
                }
                
                console.log('🔧 Inicializando Firebase...');
                console.log('Config:', {
                    apiKey: firebaseConfig.apiKey.substring(0, 10) + '...',
                    authDomain: firebaseConfig.authDomain,
                    projectId: firebaseConfig.projectId
                });

                if (!firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                    console.log('✓ Firebase App inicializado');
                }
                
                db = firebase.database();
                console.log('✓ Firebase Realtime Database conectado');
                console.log('✓ Project ID:', firebaseConfig.projectId);
                firebaseInitialized = true;
                
                return true;
            } catch (err) {
                console.error('❌ Erro ao inicializar Firebase:', err.message);
                console.error('Stack:', err.stack);
                firebaseInitialized = false;
                return false;
            }
        }

        // Salvar dados no Firebase (escopo compartilhado entre contas)
        async function saveToFirebase(dataKey, data, timestamp = new Date().toISOString()) {
            if (!firebaseInitialized || !db) return;

            try {
                const safeDataKey = normalizeFirebasePathSegment(dataKey);
                const path = `marimbondos/shared/${safeDataKey}`;

                const savePromise = db.ref(path).set({
                    data: data,
                    timestamp
                });

                await withAsyncTimeout(savePromise, 5000, 'Timeout ao salvar no Firebase');
                console.log(`✓ Dados salvos em Firebase: ${dataKey} (path: ${path})`);
                return timestamp;
            } catch (err) {
                console.error('Erro ao salvar dados em Firebase:', err.message);
                console.warn('⚠️ Dados salvos apenas localmente');
                throw err;
            }
        }
        async function loadFromFirebase(dataKey) {
            if (!firebaseInitialized || !db) return null;

            try {
                const safeDataKey = normalizeFirebasePathSegment(dataKey);
                const path = `marimbondos/shared/${safeDataKey}`;

                const loadPromise = db.ref(path).once('value');
                const snapshot = await withAsyncTimeout(loadPromise, 5000, 'Timeout ao carregar do Firebase');

                if (snapshot.exists()) {
                    console.log(`✓ Dados carregados do Firebase: ${dataKey} (path: ${path})`);
                    return snapshot.val().data;
                }
                return null;
            } catch (err) {
                console.error('Erro ao carregar dados do Firebase:', err.message);
                return null;
            }
        }

        // Carregar dados do Firebase ao inicializar
        async function loadFromFirebaseOnStartup() {
            console.log('🔍 loadFromFirebaseOnStartup() chamado | Firebase:', firebaseInitialized, '| DB:', !!db);
            
            if (!firebaseInitialized || !db) {
                console.warn('⚠️ Firebase não inicializado (firebaseInitialized:', firebaseInitialized, ', db:', !!db, '), pulando carregamento');
                return;
            }

            try {
                console.log('📥 Carregando todos os dados do Firebase...');
                const allData = await loadFromFirebase('all_data');

                if (allData) {
                    const sanitizedData = sanitizeRemoteAppState(allData);
                    applyRemoteAppState(sanitizedData);
                    console.log('✅ Dados sincronizados do Firebase com sucesso!');
                    console.log('Dados:', {
                        alunos: sanitizedData.students.length,
                        professores: sanitizedData.teachers.length,
                        registros: sanitizedData.history.length
                    });
                    // Persistir localmente sem reenviar o mesmo snapshot para o Firebase
                    persistence.save(buildAppStateSnapshot());
                } else {
                    console.log('ℹ️ Nenhum dado encontrado no Firebase (primeira sincronização)');
                }

                // Configurar a sincronização em tempo real para escopo global
                setupRealtimeSync();
            } catch (err) {
                console.error('❌ Erro ao carregar dados do Firebase:', err);
                // Mesmo em caso de erro, garantimos listener para quando vier conexão
                setupRealtimeSync();
            }
        }
        async function flushFirebaseSync() {
            if (!firebaseInitialized || !db || !pendingFirebaseState) {
                return;
            }

            if (firebaseSyncInFlight) {
                firebaseSyncRetryRequested = true;
                return;
            }

            const allData = pendingFirebaseState;
            const stateSignature = pendingFirebaseSignature || getAppStateSignature(allData);
            pendingFirebaseState = null;
            pendingFirebaseSignature = '';
            firebaseSyncInFlight = true;

            const currentTime = new Date().toISOString();
            localStorage.setItem('last_sync_timestamp', currentTime);
            lastAppliedRemoteTimestamp = currentTime;
            lastAppliedRemoteSignature = stateSignature;

            console.log('📤 Enviando dados para Firebase:', {
                alunos: allData.students?.length,
                professores: allData.teachers?.length,
                registros: allData.history?.length,
                timestamp: currentTime
            });

            try {
                await saveToFirebase('all_data', allData, currentTime);
                console.log('✅ Dados enviados com sucesso para Firebase');
            } catch (err) {
                console.error('❌ Erro ao sincronizar com Firebase:', err.message);
            } finally {
                firebaseSyncInFlight = false;
                if (firebaseSyncRetryRequested || pendingFirebaseState) {
                    firebaseSyncRetryRequested = false;
                    window.setTimeout(() => {
                        flushFirebaseSync();
                    }, FIREBASE_SYNC_DEBOUNCE_MS);
                }
            }
        }

        function syncAllDataToFirebase(options = {}) {
            if (!firebaseInitialized) {
                console.warn('⚠️ Firebase não inicializado, pulando syncAllDataToFirebase');
                return;
            }

            const immediate = Boolean(options?.immediate);
            pendingFirebaseState = sanitizeForFirebase(buildAppStateSnapshot());
            pendingFirebaseSignature = getAppStateSignature(pendingFirebaseState);

            if (firebaseSyncTimer) {
                window.clearTimeout(firebaseSyncTimer);
                firebaseSyncTimer = null;
            }

            if (immediate) {
                flushFirebaseSync();
                return;
            }

            firebaseSyncTimer = window.setTimeout(() => {
                firebaseSyncTimer = null;
                flushFirebaseSync();
            }, FIREBASE_SYNC_DEBOUNCE_MS);
        }

        function sanitizeForFirebase(value) {
            if (Array.isArray(value)) {
                return value
                    .map(item => sanitizeForFirebase(item))
                    .filter(item => item !== undefined);
            }

            if (value && typeof value === 'object') {
                const cleanedObject = {};
                Object.entries(value).forEach(([key, entryValue]) => {
                    const cleanedValue = sanitizeForFirebase(entryValue);
                    if (cleanedValue !== undefined) {
                        cleanedObject[key] = cleanedValue;
                    }
                });
                return cleanedObject;
            }

            return value === undefined ? undefined : value;
        }

        function buildAppStateSnapshot() {
            return {
                settings: MOCK_SETTINGS,
                students: MOCK_STUDENTS,
                teachers: MOCK_TEACHERS,
                history: MOCK_HISTORY,
                notices: MOCK_NOTICES,
                storeItems: MOCK_STORE_ITEMS,
                learnedImportNames: LEARNED_IMPORT_NAMES,
                counters: {
                    history: historyCounter,
                    notices: noticesCounter,
                    storeItems: storeItemCounter
                }
            };
        }

        function getAppStateSignature(state = buildAppStateSnapshot()) {
            try {
                return JSON.stringify(sanitizeForFirebase(state));
            } catch (error) {
                console.warn('Não foi possível gerar a assinatura do estado da aplicação:', error);
                return '';
            }
        }

        function scheduleUIRefresh() {
            if (!appScreenReady || !currentTabView) return;

            if (uiRefreshTimer) {
                window.clearTimeout(uiRefreshTimer);
            }

            uiRefreshTimer = window.setTimeout(() => {
                uiRefreshTimer = null;
                if (appScreenReady && currentTabView) {
                    refreshUI();
                }
            }, 120);
        }

        // Configurar sincronização em tempo real com Firebase
        function setupRealtimeSync() {
            console.log('🔌 setupRealtimeSync() chamado | Firebase:', firebaseInitialized, '| DB:', !!db);
            
            if (!firebaseInitialized || !db) {
                console.warn('⚠️ Firebase não inicializado, não configurando listener');
                return;
            }

            try {
                const listenerKey = 'shared';
                const path = `marimbondos/shared/all_data`;
                console.log('📡 Configurando listener em:', path);

                // Limpar listener anterior se existir
                if (firebaseListeners[listenerKey]) {
                    firebaseListeners[listenerKey].off();
                    delete firebaseListeners[listenerKey];
                }

                // Configurar novo listener
                firebaseListeners[listenerKey] = db.ref(path);
                firebaseListeners[listenerKey].on('value', (snapshot) => {
                    try {
                        if (snapshot.exists()) {
                            const remoteData = snapshot.val();
                            if (remoteData && remoteData.data) {
                                const remoteTimestamp = new Date(remoteData.timestamp);
                                const localTimestamp = new Date(localStorage.getItem('last_sync_timestamp') || 0);
                                const remoteTime = Number.isNaN(remoteTimestamp.getTime()) ? 0 : remoteTimestamp.getTime();
                                const localTime = Number.isNaN(localTimestamp.getTime()) ? 0 : localTimestamp.getTime();

                                console.log('📥 Dados remotos recebidos:', {
                                    remoteTime: remoteTime ? remoteTimestamp.toISOString() : 'inválido',
                                    localTime: localTime ? localTimestamp.toISOString() : 'inválido',
                                    alunos: remoteData.data.students?.length || 0
                                });

                                // Sincronizar se dados remotos forem mais recentes OU se for diferente dos locais
                                const localData = buildAppStateSnapshot();
                                const localSignature = getAppStateSignature(localData);
                                const sanitizedRemoteData = sanitizeRemoteAppState(remoteData.data);
                                const remoteSignature = getAppStateSignature(sanitizedRemoteData);
                                const dataChanged = Boolean(remoteSignature) && remoteSignature !== localSignature;
                                const sameRemoteEvent = remoteData.timestamp === lastAppliedRemoteTimestamp && remoteSignature === lastAppliedRemoteSignature;

                                if (sameRemoteEvent) {
                                    return;
                                }

                                const shouldApplyRemote = dataChanged && (remoteTime > localTime || (!localTime && dataChanged));
                                const shouldPushLocal = dataChanged && localTime > remoteTime;

                                if (shouldApplyRemote) {
                                    console.log('🔄 Sincronizando dados remotos (mais recentes ou alterados)...');

                                    applyRemoteAppState(sanitizedRemoteData);

                                    // Salvar localmente sem trigger Firebase (evitar loop)
                                    const data = buildAppStateSnapshot();
                                    persistence.save(data);

                                    // Atualizar timestamp local
                                    localStorage.setItem('last_sync_timestamp', remoteTimestamp.toISOString());
                                    lastAppliedRemoteTimestamp = String(remoteData.timestamp || '');
                                    lastAppliedRemoteSignature = remoteSignature;

                                    console.log('✅ Dados sincronizados automaticamente do Firebase');
                                    console.log('Dados remotos:', {
                                        alunos: sanitizedRemoteData.students.length,
                                        professores: sanitizedRemoteData.teachers.length,
                                        registros: sanitizedRemoteData.history.length
                                    });
                                    THEME_SETTINGS.current = getUserThemePreference();
                                    applyTheme();

                                    // Atualizar UI se necessário
                                    if (appScreenReady && currentTabView) {
                                        scheduleUIRefresh();
                                    }
                                } else if (shouldPushLocal) {
                                    console.log('⬆️ Mantendo dados locais mais recentes e reenviando ao Firebase...');
                                    syncAllDataToFirebase({ immediate: true });
                                }
                            }
                        }
                    } catch (err) {
                        console.error('Erro ao processar dados remotos:', err);
                    }
                });

                console.log('✓ Sincronização em tempo real configurada para path:', path);
            } catch (err) {
                console.error('Erro ao configurar sincronização em tempo real:', err);
            }
        }

        // Limpar listeners do Firebase
        function cleanupFirebaseListeners() {
            Object.values(firebaseListeners).forEach(listener => {
                if (listener && typeof listener.off === 'function') {
                    listener.off();
                }
            });
            firebaseListeners = {};
            console.log('✓ Listeners do Firebase limpos');
        }

        function flushPendingFirebaseSyncOnExit() {
            if (pendingFirebaseState) {
                syncAllDataToFirebase({ immediate: true });
            }
        }

        window.addEventListener('pagehide', flushPendingFirebaseSyncOnExit);
        window.addEventListener('beforeunload', flushPendingFirebaseSyncOnExit);

        function checkStorageAvailability() {
            try {
                const test = '__storage_test__';
                localStorage.setItem(test, test);
                localStorage.removeItem(test);
                return true;
            } catch (e) {
                console.warn('⚠️ localStorage não disponível (possivelmente bloqueado por Tracking Prevention):', e.message);
                return false;
            }
        }

        function checkIndexedDBAvailability() {
            return new Promise((resolve) => {
                if (!window.indexedDB) {
                    console.warn('⚠️ IndexedDB não suportado pelo navegador');
                    resolve(false);
                    return;
                }
                
                const request = indexedDB.open('test', 1);
                request.onerror = () => {
                    console.warn('⚠️ IndexedDB bloqueado ou não disponível');

                    resolve(true);
                };
            });

        function checkLibraries() {
            setTimeout(() => {
                if (typeof XLSX === 'undefined') {
                    console.warn('XLSX library não foi carregado. Tentando carregar de fonte alternativa...');
                    
                    const loadXLSX = (sources, index = 0) => {
                        if (index >= sources.length) {
                            console.error('❌ Todas as fontes do XLSX falharam. Funcionalidade de exportação pode não funcionar.');
                            return;
                        }
                        
                        const script = document.createElement('script');
                        script.src = sources[index];
                        script.onload = () => {
                            console.log(`✓ XLSX carregado com sucesso da fonte ${index + 1}: ${sources[index]}`);
                        };
                        script.onerror = () => {
                            console.warn(`Fonte ${index + 1} falhou, tentando próxima...`);
                            loadXLSX(sources, index + 1);
                        };
                        document.head.appendChild(script);
                    };
                    
                    // Múltiplas fontes para garantir carregamento
                    const xlsxSources = [
                        'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js',
                        'https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js',
                        'https://cdn.jsdelivr.net/npm/xlsx@0.17.5/dist/xlsx.full.min.js'
                    ];
                    
                    loadXLSX(xlsxSources);
                } else {
                    console.log('✓ XLSX carregado corretamente');
                }
            }, 2000); // Aguardar 2 segundos para carregamento inicial

        function getCurrentThemeMode() {
            return document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        }

        function applyLoginHolidayTheme(mode = getCurrentThemeMode()) {
            const loginScreen = document.getElementById('login-screen');
            const holidayPill = document.getElementById('login-holiday-pill');
            if (!loginScreen) return;

            const holidayTheme = getHolidayAppTheme();
            loginScreen.dataset.loginHoliday = holidayTheme;

            if (!holidayTheme || holidayTheme === 'none') {
                [
                    '--login-screen-bg',
                    '--login-screen-halo',
                    '--login-screen-glow',
                    '--login-panel-bg',
                    '--login-panel-border',
                    '--login-panel-shadow',
                    '--login-accent-bg',
                    '--login-accent-shadow',
                    '--login-pill-bg',
                    '--login-pill-fg',
                    '--login-pill-border',
                    '--login-info-bg',
                    '--login-info-border',
                    '--login-button-bg',
                    '--login-button-fg',
                    '--login-input-bg',
                    '--login-input-border'
                ].forEach(propertyName => loginScreen.style.removeProperty(propertyName));

                if (holidayPill) {
                    holidayPill.textContent = '';
                    holidayPill.classList.add('hidden');
                }
                return;
            }

            const palette = SEASONAL_THEME_PALETTES[holidayTheme]?.[mode] || SEASONAL_THEME_PALETTES[holidayTheme]?.light;
            const presentation = getSeasonalThemePresentation(holidayTheme);
            if (!palette) return;

            loginScreen.style.setProperty('--login-screen-bg', `radial-gradient(circle at 16% 18%, ${palette.primary}26 0%, transparent 28%), radial-gradient(circle at 84% 80%, ${palette.secondary}22 0%, transparent 24%), linear-gradient(160deg, ${palette.bg} 0%, ${palette.bgSecondary} 100%)`);
            loginScreen.style.setProperty('--login-screen-halo', `radial-gradient(circle, ${palette.primary}33 0%, transparent 72%)`);
            loginScreen.style.setProperty('--login-screen-glow', `radial-gradient(circle, ${palette.secondary}2a 0%, transparent 74%)`);
            loginScreen.style.setProperty('--login-panel-bg', mode === 'dark' ? 'rgba(17, 24, 39, 0.82)' : 'rgba(255, 255, 255, 0.82)');
            loginScreen.style.setProperty('--login-panel-border', `${palette.primary}44`);
            loginScreen.style.setProperty('--login-panel-shadow', `0 24px 60px ${palette.primary}24`);
            loginScreen.style.setProperty('--login-accent-bg', `linear-gradient(135deg, ${palette.primary}, ${palette.secondary})`);
            loginScreen.style.setProperty('--login-accent-shadow', `${palette.primary}55`);
            loginScreen.style.setProperty('--login-pill-bg', palette.bgCard);
            loginScreen.style.setProperty('--login-pill-fg', palette.textPrimary);
            loginScreen.style.setProperty('--login-pill-border', `${palette.primary}40`);
            loginScreen.style.setProperty('--login-info-bg', palette.bgCard);
            loginScreen.style.setProperty('--login-info-border', `${palette.secondary}3d`);
            loginScreen.style.setProperty('--login-button-bg', `linear-gradient(135deg, ${palette.primaryDark}, ${palette.secondary})`);
            loginScreen.style.setProperty('--login-button-fg', '#ffffff');
            loginScreen.style.setProperty('--login-input-bg', mode === 'dark' ? `${palette.bg}` : 'rgba(255,255,255,0.92)');
            loginScreen.style.setProperty('--login-input-border', `${palette.primary}35`);

            if (holidayPill) {
                holidayPill.textContent = presentation.label || (GLOBAL_SEASONAL_THEME_LABELS[holidayTheme] || holidayTheme);
                holidayPill.classList.remove('hidden');
            }
        }

        function getSeasonalThemePresentation(themeKey = getActiveGlobalSeasonalTheme()) {
            return SEASONAL_THEME_PRESENTATIONS[themeKey] || SEASONAL_THEME_PRESENTATIONS.none;
        }

        function getSeasonalThemeAtmosphere(themeKey = getActiveGlobalSeasonalTheme()) {
            return SEASONAL_THEME_ATMOSPHERE[themeKey] || SEASONAL_THEME_ATMOSPHERE.none;
        }

        function emojiToCodePointString(value = '') {
            return Array.from(String(value || '').trim())
                .map(char => char.codePointAt(0).toString(16))
                .join('-');
        }

        function getTwemojiAssetUrl(emoji = '✨') {
            const codePointString = emojiToCodePointString(emoji);
            if (!codePointString) return '';
            return `https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${codePointString}.svg`;
        }

        function getSeasonalThemeVisuals(themeKey = getActiveGlobalSeasonalTheme()) {
            const visuals = SEASONAL_THEME_VISUALS[themeKey] || SEASONAL_THEME_VISUALS.none;
            return {
                ...visuals,
                heroImageUrl: getTwemojiAssetUrl(visuals.heroEmoji || '✨')
            };
        }

        function getSeasonalThemeAccents(themeKey = getActiveGlobalSeasonalTheme()) {
            return SEASONAL_THEME_ACCENTS[themeKey] || { scene: [], showcase: [] };
        }

        function renderSeasonalAccentElements(items = []) {
            return (items || []).map(item => `<span class="${item.className}" style="${item.style}"></span>`).join('');
        }

        function getSeasonalComfortLabel(themeKey = getActiveGlobalSeasonalTheme(), mode = getCurrentThemeMode()) {
            if (!themeKey || themeKey === 'none') return 'Leitura confortável';
            const baseLabel = mode === 'dark' ? 'Contraste noturno suave' : 'Cores leves para uso diário';
            const overrides = {
                carnaval: mode === 'dark' ? 'Festa vibrante sem cansar' : 'Carnaval leve e caloroso',
                pascoa: 'Pastel doce com mais vida e brilho',
                tiradentes: 'Sobriedade elegante e legível',
                'dia-do-trabalho': 'Azul técnico com conforto visual',
                'sao-joao': 'Calor junino com leitura limpa',
                independencia: 'Cerimônia clara e equilibrada',
                'nossa-senhora': 'Azul sereno e luminoso',
                criancas: 'Diversão colorida sem excesso',
                halloween: 'Mistério bonito e bem dosado',
                finados: 'Tom respeitoso e descansado',
                proclamacao: 'Verde cívico mais refinado',
                'consciencia-negra': 'Profundidade quente e nobre',
                natal: 'Festa suave e acolhedora',
                'ano-novo': 'Frescor luminoso e sofisticado'
            };
            return overrides[themeKey] || baseLabel;
        }

        function updateBrowserThemeColor(color) {
            const resolvedColor = String(color || '').trim() || '#FFB800';
            let metaThemeColor = document.querySelector('meta[name="theme-color"]');
            if (!metaThemeColor) {
                metaThemeColor = document.createElement('meta');
                metaThemeColor.name = 'theme-color';
                document.head.appendChild(metaThemeColor);
            }
            metaThemeColor.setAttribute('content', resolvedColor);
        }

        function syncAndroidSeasonalAppIcon(themeKey = getHolidayAppTheme()) {
            try {
                const normalizedTheme = GLOBAL_SEASONAL_THEME_OPTIONS.includes(String(themeKey || 'none')) ? String(themeKey || 'none') : 'none';
                if (!window.AndroidApp || typeof window.AndroidApp.setSeasonalAppIcon !== 'function') return;
                window.AndroidApp.setSeasonalAppIcon(normalizedTheme);
            } catch (error) {
                console.warn('Não foi possível sincronizar o ícone sazonal no Android:', error);
            }
        }

        function renderSeasonalThemeScene() {
            const body = document.body;
            if (!body) return;

            let container = document.getElementById('seasonal-theme-scene');
            if (!container) {
                container = document.createElement('div');
                container.id = 'seasonal-theme-scene';
                container.className = 'seasonal-theme-scene';
                body.prepend(container);
            }

            container.innerHTML = '';
            container.className = 'seasonal-theme-scene hidden';
            container.classList.add('hidden');
        }

            return '';
        }

        function normalizeSearchText(value = '') {
            return String(value || '')
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .toLowerCase()
                .trim();
        }

        function getThemeNoticeCycle(themeKey = getActiveGlobalSeasonalTheme()) {
            const today = new Date();
            return `${themeKey}-${today.getFullYear()}-${today.getMonth() + 1}-${today.getDate()}`;
        }

        function getSeasonalThemeByDate(referenceDate = new Date()) {
            const month = referenceDate.getMonth() + 1;
            const day = referenceDate.getDate();
            const numericDate = month * 100 + day;

            if (numericDate >= 215 && numericDate <= 229) return 'carnaval';
            if (numericDate >= 320 && numericDate <= 420) return 'pascoa';
            if (numericDate >= 421 && numericDate <= 422) return 'tiradentes';
            if (numericDate === 501) return 'dia-do-trabalho';
            if (numericDate >= 601 && numericDate <= 630) return 'sao-joao';
            if (numericDate === 907) return 'independencia';
            if (numericDate === 1012) return 'nossa-senhora';
            if (numericDate === 1015) return 'criancas';
            if (numericDate >= 1025 && numericDate <= 1031) return 'halloween';
            if (numericDate === 1102) return 'finados';
            if (numericDate === 1115) return 'proclamacao';
            if (numericDate === 1120) return 'consciencia-negra';
            if (numericDate >= 1201 && numericDate <= 1225) return 'natal';
            if (numericDate >= 1226 || numericDate <= 106) return 'ano-novo';
            return 'none';
        }

        function getHolidayAppTheme(referenceDate = new Date()) {
            return getSeasonalThemeByDate(referenceDate);
        }

        function getActiveGlobalSeasonalTheme() {
            return 'none';
        }

        function getCurrentTeacherRecord() {
            const currentEmail = normalizeEmailAddress(MOCK_USER.email);
            return MOCK_TEACHERS.find(teacher => normalizeEmailAddress(teacher.email) === currentEmail) || null;
        }

        function normalizeTeacherRecord(teacher) {
            if (!teacher || typeof teacher !== 'object') return null;
            const normalizedRole = String(teacher.role || 'Professor').trim() || 'Professor';
            return {
                ...teacher,
                email: String(teacher.email || '').trim().toLowerCase(),
                name: String(teacher.name || '').trim(),
                password: teacher.password != null ? String(teacher.password).trim() : '',
                role: normalizedRole,
                themePreference: PERSONAL_THEME_OPTIONS.includes(String(teacher.themePreference || '').trim())
                    ? String(teacher.themePreference).trim()
                    : 'auto'
            };
        }

        function ensureViewerAccount() {
            const existingViewer = MOCK_TEACHERS.find(teacher => deriveRoleType(teacher.role) === 'viewer');
            if (existingViewer) {
                existingViewer.role = 'Viewer';
                existingViewer.themePreference = PERSONAL_THEME_OPTIONS.includes(existingViewer.themePreference) ? existingViewer.themePreference : 'auto';
                return;
            }

            if (MOCK_SETTINGS.viewerSeedInitialized) {
                return;
            }

            MOCK_TEACHERS.push({ ...VIEWER_ACCOUNT_TEMPLATE });
            MOCK_SETTINGS.viewerSeedInitialized = true;
        }

        function normalizeAllTeachers() {
            MOCK_TEACHERS = (MOCK_TEACHERS || [])
                .map(normalizeTeacherRecord)
                .filter(teacher => teacher && teacher.email && teacher.name);

            const currentUserEmail = normalizeEmailAddress(MOCK_USER.email);
            if (!MOCK_TEACHERS.some(teacher => normalizeEmailAddress(teacher.email) === currentUserEmail)) {
                MOCK_TEACHERS.unshift(normalizeTeacherRecord({
                    email: currentUserEmail,
                    name: MOCK_USER.name,
                    password: MOCK_USER.pin,
                    role: MOCK_USER.role,
                    themePreference: 'auto'
                }));
            }

            ensureViewerAccount();
            MOCK_TEACHERS.sort((a, b) => a.name.localeCompare(b.name, 'pt-BR'));
        }

        function getUserThemePreference() {
            const teacher = getCurrentTeacherRecord();
            if (teacher && PERSONAL_THEME_OPTIONS.includes(teacher.themePreference)) {
                return teacher.themePreference;
            }

            const savedTheme = localStorage.getItem(`marimbondos_theme_${getCurrentUserStorageKey()}`);
            return PERSONAL_THEME_OPTIONS.includes(savedTheme) ? savedTheme : 'auto';
        }

        function applySeasonalTheme(mode = getCurrentThemeMode()) {
            const root = document.documentElement;
            const body = document.body;
            root.dataset.seasonTheme = 'none';
            body.dataset.seasonTheme = 'none';
            body.style.removeProperty('background-image');
            body.style.removeProperty('background-attachment');
            root.style.removeProperty('--seasonal-highlight');
            root.style.removeProperty('--seasonal-highlight-soft');
            root.style.removeProperty('--seasonal-scene-texture-url');
            root.style.removeProperty('--seasonal-stage-texture-url');
            root.style.removeProperty('--seasonal-motion-primary');
            root.style.removeProperty('--seasonal-motion-secondary');
            root.style.removeProperty('--seasonal-motion-tertiary');
            root.style.removeProperty('--seasonal-panel-entrance');
            root.style.removeProperty('--seasonal-tab-enter-x');
            root.style.removeProperty('--seasonal-tab-enter-y');
            root.style.removeProperty('--seasonal-tab-enter-rotate');
            root.style.removeProperty('--seasonal-shimmer-gradient');
            root.style.removeProperty('--seasonal-orb-gradient');
            root.style.removeProperty('--seasonal-orb-opacity');
            root.style.removeProperty('--seasonal-stage-card-gradient');
            updateBrowserThemeColor(mode === 'dark' ? '#0F0E0C' : '#FFB800');
            renderSeasonalThemeScene();
            renderSeasonalThemeDecorations([]);
            syncAndroidSeasonalAppIcon(getHolidayAppTheme());
        }

        function renderSeasonalThemeDecorations(motifs = []) {
            const body = document.body;
            if (!body) return;

            let container = document.getElementById('seasonal-theme-decorations');
            if (!container) {
                container = document.createElement('div');
                container.id = 'seasonal-theme-decorations';
                container.className = 'seasonal-theme-decorations';
                body.appendChild(container);
            }

            if (!motifs.length) {
                container.innerHTML = '';
                container.classList.add('hidden');
                return;
            }

            const slots = [
                { top: '9%', left: '4%' },
                { top: '18%', right: '6%' },
                { top: '38%', left: '8%' },
                { top: '56%', right: '5%' },
                { top: '74%', left: '6%' },
                { top: '82%', right: '7%' }
            ];

            container.classList.remove('hidden');
            container.innerHTML = slots.map((slot, index) => {
                const motif = motifs[index % motifs.length];
                const position = Object.entries(slot).map(([key, value]) => `${key}:${value};`).join('');
                return `<span class="seasonal-theme-motif" style="${position} animation-delay:${(index * 0.25).toFixed(2)}s">${motif}</span>`;
            }).join('');
        }

        function initTheme() {
            THEME_SETTINGS.current = getUserThemePreference();
            applyTheme();
        }

        function applyTheme() {
            const theme = THEME_SETTINGS.current;
            const isDark = theme === 'auto' 
                ? window.matchMedia('(prefers-color-scheme: dark)').matches 
                : theme === 'dark';
            
            const root = document.documentElement;
            const body = document.body;
            
            if (isDark) {
                // Tema Escuro - Cores Modernas
                root.classList.add('dark');
                body.classList.remove('dark-light');
                
                root.style.setProperty('--primary', '#fbbf24');
                root.style.setProperty('--primary-dark', '#f59e0b');
                root.style.setProperty('--secondary', '#3b82f6');
                root.style.setProperty('--success', '#10b981');
                root.style.setProperty('--danger', '#ef4444');
                root.style.setProperty('--warning', '#f59e0b');
                
                root.style.setProperty('--bg', '#0f172a');
                root.style.setProperty('--bg-secondary', '#111827');
                root.style.setProperty('--bg-card', '#1f2937');
                root.style.setProperty('--text-primary', '#f8fafc');
                root.style.setProperty('--text-secondary', '#cbd5e1');
                root.style.setProperty('--text-tertiary', '#fde68a');
                root.style.setProperty('--border', 'rgba(251, 191, 36, 0.16)');
                root.style.setProperty('--shadow', 'rgba(0, 0, 0, 0.34)');
                root.style.setProperty('--surface-1', '#1f2937');
                root.style.setProperty('--surface-2', '#111827');
                root.style.setProperty('--surface-muted', '#273449');
                root.style.setProperty('--panel-border', 'rgba(251, 191, 36, 0.16)');
                root.style.setProperty('--panel-shadow', '0 18px 40px rgba(0, 0, 0, 0.34)');
                body.style.backgroundImage = '';
                body.style.backgroundAttachment = '';
            } else {
                // Tema Claro - Cores Modernas
                root.classList.remove('dark');
                body.classList.add('dark-light');
                
                root.style.setProperty('--primary', '#fbbf24');
                root.style.setProperty('--primary-dark', '#f59e0b');
                root.style.setProperty('--secondary', '#3b82f6');
                root.style.setProperty('--success', '#10b981');
                root.style.setProperty('--danger', '#ef4444');
                root.style.setProperty('--warning', '#f59e0b');
                
                root.style.setProperty('--bg', '#faf1cc');
                root.style.setProperty('--bg-secondary', '#eed79a');
                root.style.setProperty('--bg-card', '#fff7de');
                root.style.setProperty('--text-primary', '#2f2410');
                root.style.setProperty('--text-secondary', '#5b4410');
                root.style.setProperty('--text-tertiary', '#7c5a10');
                root.style.setProperty('--border', 'rgba(180, 83, 9, 0.26)');
                root.style.setProperty('--shadow', 'rgba(146, 64, 14, 0.14)');
                root.style.setProperty('--surface-1', '#fff2c4');
                root.style.setProperty('--surface-2', '#e9cd81');
                root.style.setProperty('--surface-muted', '#e0be62');
                root.style.setProperty('--panel-border', 'rgba(146, 64, 14, 0.18)');
                root.style.setProperty('--panel-shadow', '0 16px 36px rgba(146, 64, 14, 0.14)');
                body.style.backgroundImage = '';
                body.style.backgroundAttachment = '';
            }

            applySeasonalTheme(isDark ? 'dark' : 'light');
            applyLoginHolidayTheme(isDark ? 'dark' : 'light');
            localStorage.setItem(`marimbondos_theme_${getCurrentUserStorageKey()}`, THEME_SETTINGS.current);
        }

        function setTheme(theme) {
            if (!PERSONAL_THEME_OPTIONS.includes(theme)) {
                showToast('Tema inválido.', 'error');
                return;
            }

            THEME_SETTINGS.current = theme;
            const currentTeacher = getCurrentTeacherRecord();
            if (currentTeacher) {
                currentTeacher.themePreference = theme;
                saveAllData();
            } else {
                localStorage.setItem(`marimbondos_theme_${getCurrentUserStorageKey()}`, theme);
            }
            applyTheme();

            return MOCK_HISTORY
                .filter(entry => entry.studentId === studentId && /banimento de aluno/i.test(entry.title || ''))

                    const plainDesc = String(entry.desc || '')
                        .replace(/<[^>]+>/g, ' ')
                        .replace(/&quot;/g, '"')
                        .replace(/&#39;/g, "'")
                        .replace(/&amp;/g, '&')
                        .replace(/\s+/g, ' ')
                        .trim();
                    const reasonMatch = plainDesc.match(/Motivo:\s*(.+?)(?:\.\s*Liberação automática prevista|$)/i);
                    return {
                        date: entry.date,
                        reason: reasonMatch ? reasonMatch[1].trim() : plainDesc,
                        fullDesc: plainDesc
